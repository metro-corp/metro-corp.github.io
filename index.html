<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>(주)METRO R&S 현장관리 시스템 V6.0</title>
    
    <script>
        // 카카오톡 외부 브라우저 유도 (V6.0 표준 규격)
        var userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.indexOf("kakaotalk") !== -1) {
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
            setTimeout(function() {
                alert("🚨 카카오톡 내부에서는 시스템이 정상 작동하지 않습니다.\n반드시 [다른 브라우저로 열기]를 선택해 주세요!");
            }, 1000);
        }
    </script>

    <meta property="og:title" content="(주)METRO R&S 현장관리 시스템">
    <meta property="og:description" content="V6.0: 마스터 DB 통합 관리 및 썸네일 엔진 시스템">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">

    <!-- 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }

        /* V6.0 전용 입력창 스타일 */
        .input-v6 { @apply w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold shadow-sm; }
        .btn-v6-primary { @apply w-full py-5 bg-slate-900 text-white rounded-[1.8rem] font-black text-lg shadow-xl active:scale-[0.97] transition-all flex items-center justify-center gap-3; }
        .section-v6 { @apply bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-slate-200/60 mb-6; }
        
        /* 사진 박스 디자인 */
        .photo-box { @apply aspect-square bg-slate-50 border-2 border-dashed border-slate-300 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition-all relative overflow-hidden; }
        .preview-img { @apply absolute inset-0 w-full h-full object-cover z-10 hidden; }

        /* V6.0 지능형 검색 결과 창 */
        #search-results { @apply hidden absolute top-full left-0 right-0 z-50 mt-4 bg-white border-2 border-blue-600 rounded-[2rem] shadow-2xl overflow-hidden max-h-80 overflow-y-auto animate-in slide-in-from-top-3 duration-300; }
        .result-item { @apply p-6 border-b last:border-0 border-slate-50 active:bg-blue-50 cursor-pointer transition-colors; }

        /* 시스템 로딩/알림 레이어 */
        #loading-overlay { @apply fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[10000] hidden flex flex-col items-center justify-center text-white; }
        #custom-alert { @apply fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[10005] hidden items-center justify-center p-6 animate-in fade-in duration-200; }
        
        /* PDF 템플릿 (V6.0 표준 레이아웃) */
        #pdf-template { @apply hidden; width: 794px; background: white; padding: 40px; font-family: 'Malgun Gothic', sans-serif; }
    </style>
</head>
<body class="pb-20">

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
    <div class="w-12 h-12 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-6"></div>
    <p id="loading-text" class="font-black tracking-widest text-sm uppercase">Cloud Synchronizing...</p>
</div>

<!-- 알림 메시지 모달 -->
<div id="custom-alert">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center scale-95 transition-transform duration-300">
        <div id="alert-icon" class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <p id="alert-msg" class="text-lg font-bold text-slate-800 mb-8 leading-tight break-keep">메시지 내용</p>
        <button onclick="closeAlert()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">확인</button>
    </div>
</div>

<header class="bg-slate-900 text-white py-8 px-10 sticky top-0 z-50 shadow-xl">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </div>
            <div>
                <h1 class="font-black text-2xl tracking-tighter leading-none uppercase">Metro R&S</h1>
                <p class="text-[10px] text-blue-400 font-bold tracking-[0.4em] uppercase mt-1">Field Manager V6.0</p>
            </div>
        </div>
    </div>
</header>

<div class="max-w-4xl mx-auto p-4 md:p-10">
    <!-- 1. 현장 동기화 섹션 -->
    <div class="section-v6">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-9 h-9 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center font-black">1</div>
            <h2 class="font-black text-slate-800 text-xl tracking-tight">현장 데이터 동기화</h2>
        </div>
        <select id="site-select" onchange="syncSiteData()" class="input-v6 text-blue-600 font-black cursor-pointer appearance-none">
            <option value="">⏳ 현장 목록을 동기화 중입니다...</option>
        </select>
    </div>

    <!-- 2. 작업 상세 입력 섹션 -->
    <div class="section-v6">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-9 h-9 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center font-black">2</div>
            <h2 class="font-black text-slate-800 text-xl tracking-tight">작업 상세 정보 입력</h2>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-5">
                <div class="col-span-2 space-y-2">
                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Date Selection</span>
                    <input type="date" id="date" class="input-v6 text-slate-600">
                </div>

                <div class="col-span-2 flex gap-3 p-2 bg-slate-100 rounded-2xl border border-slate-200">
                    <button id="btn-private" onclick="setAreaMode('private')" class="flex-1 py-3.5 rounded-xl font-black text-sm bg-white text-blue-600 shadow-sm border border-blue-50">🏠 전용 세대</button>
                    <button id="btn-common" onclick="setAreaMode('common')" class="flex-1 py-3.5 rounded-xl font-black text-sm text-slate-500">🏢 공용부 및 기타</button>
                </div>

                <div class="space-y-2">
                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Dong</span>
                    <input type="text" id="dong" placeholder="동 번호" oninput="v6EngineSearch()" class="input-v6">
                </div>
                <div id="ho-box" class="space-y-2">
                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Ho</span>
                    <input type="text" id="ho" placeholder="호수" oninput="v6EngineSearch()" class="input-v6">
                </div>
            </div>

            <div class="relative space-y-2">
                <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Work Category</span>
                <select id="work-select" onchange="v6EngineSearch()" class="input-v6 text-emerald-600 font-black appearance-none">
                    <option value="">📑 공종을 먼저 선택하세요</option>
                </select>

                <!-- 실시간 매칭 검색 결과 -->
                <div id="search-results"></div>
            </div>

            <div class="grid grid-cols-2 gap-5 pt-2">
                <input type="text" id="loc" placeholder="상세 위치" class="input-v6">
                <input type="text" id="type" placeholder="하자 유형" class="input-v6">
                <input type="text" id="contractor" placeholder="시공업체명" class="input-v6 col-span-2">
            </div>

            <textarea id="desc" placeholder="작업 상세 내용을 기록하세요" class="input-v6 h-36 resize-none leading-relaxed"></textarea>
        </div>
    </div>

    <!-- 3. 현장 증빙 및 데이터 전송 섹션 -->
    <div class="section-v6">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-9 h-9 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center font-black">3</div>
            <h2 class="font-black text-slate-800 text-xl tracking-tight">현장 증빙 및 통합 전송</h2>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-12">
            <div class="photo-box" onclick="document.getElementById('f1').click()">
                <div id="t1" class="text-center group">
                    <div class="text-3xl mb-1 group-hover:scale-110 transition-transform">📸</div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">작업 전</span>
                </div>
                <img id="p1" class="preview-img"><input type="file" id="f1" hidden accept="image/*" onchange="v6PhotoHandler(this, 'p1', 't1')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f2').click()">
                <div id="t2" class="text-center group">
                    <div class="text-3xl mb-1 group-hover:scale-110 transition-transform">📸</div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">작업 후</span>
                </div>
                <img id="p2" class="preview-img"><input type="file" id="f2" hidden accept="image/*" onchange="v6PhotoHandler(this, 'p2', 't2')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f3').click()">
                <div id="t3" class="text-center group">
                    <div class="text-3xl mb-1 group-hover:scale-110 transition-transform">📋</div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">확인서</span>
                </div>
                <img id="p3" class="preview-img"><input type="file" id="f3" hidden accept="image/*" onchange="v6PhotoHandler(this, 'p3', 't3')">
            </div>
        </div>

        <button onclick="sendV6FinalData()" class="btn-v6-primary group py-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="group-active:translate-y-1 transition-transform"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            <span class="font-black text-xl">서버 통합 전송 (V6.0)</span>
        </button>
    </div>
</div>

<!-- PDF 템플릿 (V6.0 고정 표준) -->
<div id="pdf-template">
    <h1 style="text-align:center; font-size:32px; font-weight:900; letter-spacing:15px; margin-bottom:40px;">사 진 대 지</h1>
    <table style="width:100%; border:2px solid #000; border-collapse:collapse; font-size:15px;">
        <tr>
            <td style="border:1px solid #000; padding:15px; background:#f8fafc; font-weight:bold; width:15%; text-align:center;">현장명</td>
            <td id="pdf-site" colspan="3" style="border:1px solid #000; padding:15px; font-weight:bold; font-size:18px;"></td>
        </tr>
        <tr>
            <td id="pdf-unit-label" style="border:1px solid #000; padding:15px; background:#f8fafc; font-weight:bold; text-align:center;">동/호수</td>
            <td id="pdf-unit" style="border:1px solid #000; padding:15px; width:35%;"></td>
            <td style="border:1px solid #000; padding:15px; background:#f8fafc; font-weight:bold; width:15%; text-align:center;">상세위치</td>
            <td id="pdf-loc" style="border:1px solid #000; padding:15px;"></td>
        </tr>
        <tr>
            <td style="border:1px solid #000; padding:15px; background:#f8fafc; font-weight:bold; text-align:center;">공종</td>
            <td id="pdf-work" style="border:1px solid #000; padding:15px;"></td>
            <td style="border:1px solid #000; padding:15px; background:#f8fafc; font-weight:bold; text-align:center;">시공업체</td>
            <td id="pdf-contractor" style="border:1px solid #000; padding:15px;"></td>
        </tr>
        <tr>
            <td style="border:1px solid #000; padding:15px; background:#f8fafc; font-weight:bold; text-align:center;">점검일자</td>
            <td id="pdf-date" colspan="3" style="border:1px solid #000; padding:15px;"></td>
        </tr>
        <tr>
            <td style="border:1px solid #000; padding:15px; background:#f8fafc; font-weight:bold; text-align:center;">작업내용</td>
            <td id="pdf-desc" colspan="3" style="border:1px solid #000; padding:15px; height:100px; vertical-align:top; line-height:1.6;"></td>
        </tr>
        <tr>
            <td colspan="4" style="border:1px solid #000; padding:25px; text-align:center; height:380px;">
                <div style="font-weight:900; margin-bottom:15px; font-size:16px;">[ 작 업 전 ]</div>
                <img id="pdf-p1" style="max-width:580px; max-height:330px; object-fit:contain;">
            </td>
        </tr>
        <tr>
            <td colspan="4" style="border:1px solid #000; padding:25px; text-align:center; height:380px;">
                <div style="font-weight:900; margin-bottom:15px; font-size:16px;">[ 작 업 후 ]</div>
                <img id="pdf-p2" style="max-width:580px; max-height:330px; object-fit:contain;">
            </td>
        </tr>
    </table>
</div>

<script>
    // --- V6.0 전용 서버 연결 주소 ---
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbyE1jMEzrix8xYu3_lgHUX8Oqm6TAtWP6RDZzZ2WFL9c6Crlz5BFTO7__JoFygqRwUD/exec";
    
    let cloudDB = {}; 
    let currentSid = ""; 
    let areaMode = "private";

    // --- 초기화 로직 ---
    window.onload = async () => {
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);
        await syncSites();
    };

    function showMsg(msg) {
        document.getElementById('alert-msg').innerText = msg;
        const modal = document.getElementById('custom-alert');
        modal.style.display = 'flex';
        setTimeout(() => modal.firstElementChild.classList.remove('scale-95'), 10);
    }

    function closeAlert() {
        const modal = document.getElementById('custom-alert');
        modal.firstElementChild.classList.add('scale-95');
        setTimeout(() => modal.style.display = 'none', 200);
    }

    function toggleLoading(show, text = "Processing...") {
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        document.getElementById('loading-text').innerText = text;
    }

    // --- 서버 통신 (GET: 현장 목록 및 기초 데이터) ---
    async function syncSites() {
        const sel = document.getElementById('site-select');
        try {
            const res = await fetch(`${MY_GAS_URL}?mode=getSites&t=${Date.now()}`);
            const json = await res.json();
            if(json.result === 'success') {
                sel.innerHTML = '<option value="">🏢 관리 현장을 선택하세요</option>';
                json.sites.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.name}</option>`);
            }
        } catch(e) { sel.innerHTML = '<option value="">❌ 서버 통신 오류</option>'; }
    }

    async function syncSiteData() {
        currentSid = document.getElementById('site-select').value;
        if(!currentSid) return;

        const workSel = document.getElementById('work-select');
        workSel.innerHTML = '<option value="">⏳ 공종 동기화 중...</option>';

        try {
            const res = await fetch(`${MY_GAS_URL}?targetId=${encodeURIComponent(currentSid)}&t=${Date.now()}`);
            const json = await res.json();
            if(json.result === 'success') {
                cloudDB = json.data;
                workSel.innerHTML = '<option value="">📋 관리 공종을 선택하세요</option>';
                Object.keys(cloudDB).forEach(k => {
                    if(k !== "작업기록" && k !== "통합_작업기록") workSel.innerHTML += `<option value="${k}">${k}</option>`;
                });
            }
        } catch(e) { workSel.innerHTML = '<option value="">❌ 데이터 로드 실패</option>'; }
    }

    // --- V6.0 지능형 검색 엔진 (실시간 필터링) ---
    function v6EngineSearch() {
        const work = document.getElementById('work-select').value;
        const dong = document.getElementById('dong').value.trim();
        const ho = document.getElementById('ho').value.trim();
        const resBox = document.getElementById('search-results');

        if(!work || !dong || (areaMode === 'private' && !ho)) { resBox.style.display = 'none'; return; }

        // V6.0 동적 필터링 로직
        const matches = (cloudDB[work] || []).filter(v => {
            if(areaMode === 'common') return String(v.dong).includes(dong);
            return String(v.dong) === dong && String(v.ho) === ho;
        });

        if(matches.length > 0) {
            let html = `<div class="p-5 bg-blue-600 text-white font-black text-xs flex justify-between items-center sticky top-0">
                <span class="tracking-widest uppercase">🔍 Smart Match Found (${matches.length})</span>
                <button onclick="document.getElementById('search-results').style.display='none'" class="bg-white/20 p-1.5 rounded-lg active:scale-90 transition-transform"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            </div>`;
            matches.forEach(m => {
                html += `<div class="result-item group" onclick='autoFillFields(${JSON.stringify(m).replace(/'/g, "&apos;")})'>
                    <div class="font-black text-slate-800 group-hover:text-blue-600 transition-colors">📍 ${m.loc}</div>
                    <div class="text-xs text-slate-400 mt-2 line-clamp-2 leading-relaxed font-medium">${m.desc}</div>
                </div>`;
            });
            resBox.innerHTML = html; resBox.style.display = 'block';
        } else resBox.style.display = 'none';
    }

    function autoFillFields(m) {
        document.getElementById('loc').value = m.loc || '';
        document.getElementById('type').value = m.type || '';
        document.getElementById('contractor').value = m.contractor || '';
        document.getElementById('desc').value = m.desc || '';
        document.getElementById('search-results').style.display = 'none';
    }

    // --- V6.0 이미지 최적화 및 원본 패키징 엔진 ---
    function v6PhotoHandler(input, pId, tId) {
        if(!input.files[0]) return;
        toggleLoading(true, "Image Optimization...");

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // V6.0 표준 해상도: 1200x900 (4:3)
                canvas.width = 1200; canvas.height = 900;
                
                const ratio = 1200/900;
                let sX = 0, sY = 0, sW = img.width, sH = img.height;
                if(sW/sH > ratio) { sW = sH * ratio; sX = (img.width - sW)/2; }
                else { sH = sW / ratio; sY = (img.height - sH)/2; }

                ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 1200, 900);
                
                const previewEl = document.getElementById(pId);
                
                if(pId !== 'p3') {
                    // 서버 'p1RawBase64' 필드용 원본 보관
                    previewEl.dataset.raw = canvas.toDataURL('image/jpeg', 0.85);
                    // 서버 'p1Base64' 썸네일용 워터마크 합성
                    previewEl.src = makeV6Watermark(canvas);
                } else {
                    previewEl.src = canvas.toDataURL('image/jpeg', 0.8);
                }

                previewEl.style.display = 'block';
                document.getElementById(tId).style.display = 'none';
                toggleLoading(false);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function makeV6Watermark(canvas) {
        const ctx = canvas.getContext('2d');
        const w = 1200; const h = 900;
        const boxW = 580; const boxH = 240;
        const x = 20; const y = h - boxH - 20;

        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        ctx.fillRect(x, y, boxW, boxH);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(x, y, boxW, boxH);

        const site = document.getElementById('site-select').options[document.getElementById('site-select').selectedIndex].text;
        const dong = document.getElementById('dong').value;
        const ho = document.getElementById('ho').value;
        const loc = document.getElementById('loc').value;
        const date = document.getElementById('date').value;
        const work = document.getElementById('work-select').value;
        const desc = document.getElementById('desc').value.substring(0, 22) + "...";

        ctx.fillStyle = "#000"; ctx.font = "bold 26px sans-serif"; ctx.textBaseline = "top";
        const rows = [`현 장: ${site}`, `위 치: ${dong}동 ${ho}호 (${loc})`, `공 종: ${work}`, `내 용: ${desc}`, `일 자: ${date}`];
        rows.forEach((text, i) => ctx.fillText(text, x + 25, y + 30 + (i * 40)));

        return canvas.toDataURL('image/jpeg', 0.8);
    }

    function setAreaMode(mode) {
        areaMode = mode;
        const btnP = document.getElementById('btn-private');
        const btnC = document.getElementById('btn-common');
        const hoBox = document.getElementById('ho-box');
        const dongInput = document.getElementById('dong');

        if(mode === 'common') {
            btnC.className = "flex-1 py-3.5 rounded-xl font-black text-sm bg-white text-blue-600 shadow-sm border border-blue-50";
            btnP.className = "flex-1 py-3.5 rounded-xl font-black text-sm text-slate-500";
            hoBox.style.display = 'none';
            document.getElementById('ho').value = '-';
            dongInput.placeholder = "상세 위치 (예: 주차장)";
        } else {
            btnP.className = "flex-1 py-3.5 rounded-xl font-black text-sm bg-white text-blue-600 shadow-sm border border-blue-50";
            btnC.className = "flex-1 py-3.5 rounded-xl font-black text-sm text-slate-500";
            hoBox.style.display = 'block';
            document.getElementById('ho').value = '';
            dongInput.placeholder = "동 번호";
        }
    }

    // --- 서버 전송 로직 (POST: V6.0 통합 패키지) ---
    async function sendV6FinalData() {
        const siteId = document.getElementById('site-select').value;
        const dong = document.getElementById('dong').value;
        const work = document.getElementById('work-select').value;
        const p1 = document.getElementById('p1');
        const p2 = document.getElementById('p2');

        if(!siteId || !dong || !work || !p1.src || !p2.src) {
            showMsg("🚨 필수 데이터가 누락되었습니다.\n(현장, 동, 공종, 사진 2장 필수)");
            return;
        }

        toggleLoading(true, "Finalizing PDF & Transmitting Master DB...");

        try {
            const date = document.getElementById('date').value;
            const siteName = document.getElementById('site-select').options[document.getElementById('site-select').selectedIndex].text;
            const ho = document.getElementById('ho').value;
            const loc = document.getElementById('loc').value;
            const contractor = document.getElementById('contractor').value;
            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value;

            // 1. PDF 실시간 데이터 바인딩
            document.getElementById('pdf-site').innerText = siteName;
            document.getElementById('pdf-unit').innerText = (ho === "-") ? dong : `${dong}동 ${ho}호`;
            document.getElementById('pdf-loc').innerText = loc;
            document.getElementById('pdf-work').innerText = work;
            document.getElementById('pdf-contractor').innerText = contractor;
            document.getElementById('pdf-date').innerText = date;
            document.getElementById('pdf-desc').innerText = desc;
            document.getElementById('pdf-p1').src = p1.src;
            document.getElementById('pdf-p2').src = p2.src;

            const pdfEl = document.getElementById('pdf-template');
            pdfEl.style.display = 'block';
            const pdfData = await html2pdf().set({
                margin: 0, filename: 'report.pdf', image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(pdfEl).output('datauristring');
            pdfEl.style.display = 'none';

            // 2. V6.0 서버 맞춤 페이로드 구성 (Raw + Thumbnail)
            const payload = {
                targetSheetId: siteId,
                record: { date, site: siteName, dong, ho, loc, work, type, desc, contractor },
                pdfBase64: pdfData.split(',')[1],
                p1Base64: p1.src.split(',')[1], // 썸네일본
                p1RawBase64: p1.dataset.raw ? p1.dataset.raw.split(',')[1] : "", // 원본보존
                p2Base64: p2.src.split(',')[1],
                p2RawBase64: p2.dataset.raw ? p2.dataset.raw.split(',')[1] : "",
                p3Base64: document.getElementById('p3').src ? document.getElementById('p3').src.split(',')[1] : ""
            };

            const res = await fetch(MY_GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();

            if(result.result === 'success') {
                showMsg("🎉 데이터 통합 전송 성공!\n본사 마스터 DB와 현장 시트에 안전하게 기록되었습니다.");
                // 폼 초기화
                ['dong','ho','loc','type','desc'].forEach(id => document.getElementById(id).value = '');
                [1,2,3].forEach(i => {
                    const img = document.getElementById(`p${i}`);
                    img.src = ''; img.style.display = 'none';
                    document.getElementById(`t${i}`).style.display = 'flex';
                });
            } else {
                showMsg("❌ 전송 실패: " + result.message);
            }
        } catch(e) {
            showMsg("❌ 서버 네트워크 연결 상태를 확인하세요.");
        } finally {
            toggleLoading(false);
        }
    }
</script>
