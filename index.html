<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>(주)METRO R&S 현장관리 시스템 V2.9</title>
    
    <script>
        var userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.indexOf("kakaotalk") !== -1) {
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
            setTimeout(function() {
                alert("🚨 카카오톡에서는 현장 시스템이 정상 작동하지 않습니다.\n\n우측 하단의 [점 3개(설정)] 버튼을 눌러\n반드시 [다른 브라우저로 열기]를 선택해 주세요!");
            }, 1000);
        }
    </script>

    <meta property="og:title" content="(주)METRO R&S 현장관리 시스템">
    <meta property="og:description" content="현장 사진 촬영부터 PDF 보고서 자동 생성, 구글 드라이브 분류까지 한 번에 처리하는 통합 솔루션">
    <meta property="og:image" content="https://metro-corp.github.io/og-image.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://metro-corp.github.io/">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-body: #f4f7f9; 
            --surface: #ffffff;
            --primary-dark: #0f172a;  
            --primary-light: #1e3a8a; 
            --accent: #3b82f6; 
            --accent-hover: #2563eb;
            --success: #10b981; 
            --danger: #ef4444; 
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border-light: #e2e8f0;
            --input-bg: #f8fafc;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.04);
            --shadow-hover: 0 14px 40px rgba(0,0,0,0.08);
        }

        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg-body); font-size: 15px; color: var(--text-main); padding-bottom: 60px; line-height: 1.5; }
        
        header { background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); color: white; padding: 18px; font-weight: 700; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 17px; letter-spacing: 0.5px; }
        
        .container { padding: 15px; max-width: 800px; margin: auto; }
        
        .section { background: var(--surface); padding: 24px; border-radius: 20px; margin-bottom: 20px; box-shadow: var(--shadow-soft); border: 1px solid rgba(255,255,255,0.8); transition: transform 0.3s ease; }
        
        .section-title { font-weight: 800; color: var(--primary-dark); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; font-size: 16px; border-bottom: 2px solid var(--border-light); padding-bottom: 12px; }
        .section-title span { background: #e0e7ff; color: var(--accent); padding: 4px 8px; border-radius: 8px; font-size: 14px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .full { grid-column: span 2; }
        
        input, select, textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-light); border-radius: 12px; box-sizing: border-box; background-color: var(--input-bg); font-family: inherit; font-size: 15px; color: var(--text-main); transition: all 0.2s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background-color: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); transform: translateY(-1px); }
        textarea { resize: vertical; min-height: 100px; }

        #site-select { font-weight: 700; color: var(--accent-hover); background-color: #f0f9ff; border-color: #bae6fd; font-size: 16px; }
        #db-sheet { font-weight: 700; color: var(--success); background-color: #ecfdf5; border-color: #a7f3d0; }

        #search-results { display: none; background: #fff; border: 1px solid var(--border-light); border-radius: 12px; margin-top: -5px; margin-bottom: 15px; grid-column: span 2; box-shadow: var(--shadow-hover); max-height: 250px; overflow-y: auto; overflow-x: hidden; }
        .result-item { padding: 14px 16px; border-bottom: 1px solid var(--border-light); cursor: pointer; text-align: left; transition: background 0.2s; }
        .result-item:hover { background: #f8fafc; }
        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; color: var(--text-sub); font-size: 13px; margin-top: 4px; }

        .photo-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        
        .photo-box { background: var(--input-bg); aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #cbd5e1; border-radius: 14px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s ease; color: var(--text-sub); font-weight: 600; font-size: 13px; }
        .photo-box:hover { border-color: var(--accent); background: #f0f9ff; color: var(--accent); transform: translateY(-2px); }
        .photo-box span { margin-top: 5px; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; z-index: 10; border-radius: 12px; }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        
        button { padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; font-size: 15px; font-family: inherit; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; justify-content: center; align-items: center; gap: 6px; white-space: nowrap; }
        button:active { transform: scale(0.97); }
        .btn-save { background: var(--success); flex: 1; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-save:hover { background: #059669; box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3); }
        .btn-send { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); flex: 2; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; margin-top: 15px; }
        th, td { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border-light); }
        th { background: var(--input-bg); font-weight: 700; color: var(--primary-dark); }
        th:first-child { border-top-left-radius: 12px; } th:last-child { border-top-right-radius: 12px; }
        tr:last-child td { border-bottom: none; }
        
        .action-btn { background: #e2e8f0; color: var(--primary-dark); padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; flex: 1; white-space: nowrap; word-break: keep-all; }
        .action-btn.del { background: #fee2e2; color: var(--danger); }
        .action-btn:hover { filter: brightness(0.95); transform: translateY(-1px); }

        /* 💡 수정됨: PDF를 화면 최상단(top:0, left:0)에 두되, z-index를 9998로 하여 로딩스크린 바로 밑에 둡니다. 백지가 되지 않습니다! */
        #pdf-template { 
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 9998; 
            width: 794px; 
            height: 1122px; 
            padding: 40px; 
            background: white; 
            font-family: 'Malgun Gothic', sans-serif; 
            box-sizing: border-box; 
            overflow: hidden; 
        }

        /* 💡 로딩 화면 디자인 추가 */
        #loading-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.95); 
            z-index: 9999; /* PDF보다 1 높아서 PDF를 완벽히 가림 */
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: var(--primary-dark); 
            font-weight: 800; 
            font-size: 18px; 
        }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.5; transform: scale(0.9); } }
        .loader-icon { font-size: 50px; margin-bottom: 15px; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader-icon">🚀</div>
    <div id="loading-text">PDF 생성 및 전송 중...</div>
</div>

<header>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
        <img src="logo.png" alt="METRO" style="height: 24px; border-radius: 4px;" onerror="this.src='https://via.placeholder.com/100x30?text=METRO+R%26S'">
        <span>(주)METRO R&S 현장관리 시스템 V2.9</span>
    </div>
</header>

<div class="container">
    <div class="section">
        <div class="section-title"><span>1</span> 현장 선택</div>
        <select id="site-select" onchange="loadDB()" class="full">
            <option value="">⏳ 현장 목록을 불러오는 중입니다...</option>
        </select>
    </div>

    <div class="section">
        <div class="section-title"><span>2</span> 작업 정보 입력</div>
        <div class="grid">
            <input type="date" id="today-date" class="full">
            <select id="db-sheet" onchange="clearInputs()" class="full"><option value="">현장을 먼저 선택해주세요</option></select>
            <input type="text" id="dong" placeholder="동 (예: 101)" oninput="search()">
            <input type="text" id="ho" placeholder="호 (예: 201)" oninput="search()">
            <div id="search-results"></div>
            <input type="text" id="site" placeholder="현장명" readonly class="full" style="background-color: #e2e8f0; color: #64748b; font-weight:600;">
            <input type="text" id="loc" placeholder="위치">
            <input type="text" id="work" placeholder="공종">
            <input type="text" id="type" placeholder="하자 유형">
            <input type="text" id="contractor" placeholder="시공업체">
            <textarea id="desc" placeholder="상세 작업 내용을 입력하세요" class="full"></textarea>
        </div>
        
        <div class="section-title" style="margin-top: 25px; border:none; padding-bottom:0;"><span>3</span> 현장 사진 첨부</div>
        <div class="photo-area">
            <div class="photo-box" onclick="document.getElementById('f1').click()">
                <div style="font-size: 24px;">📷</div><span id="t1">작업 전</span>
                <img id="p1" class="preview-img"><input type="file" id="f1" hidden accept="image/*" onchange="proc(this,'p1','t1')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f2').click()">
                <div style="font-size: 24px;">📷</div><span id="t2">작업 후</span>
                <img id="p2" class="preview-img"><input type="file" id="f2" hidden accept="image/*" onchange="proc(this,'p2','t2')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f3').click()">
                <div style="font-size: 24px;">📋</div><span id="t3">확인서</span>
                <img id="p3" class="preview-img"><input type="file" id="f3" hidden accept="image/*" onchange="proc(this,'p3','t3')">
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-save" onclick="saveLocal()">💾 수정 저장</button>
            <button class="btn-send" id="btn-send" onclick="send()">🚀 최종 전송</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title"><span>목록</span> 임시 저장 내역 (<span id="count" style="color:var(--accent);">0</span>건)</div>
        <table>
            <thead><tr><th style="width:10%">No</th><th style="width:50%">동/호 (공종)</th><th style="width:40%">관리</th></tr></thead>
            <tbody id="list-body"><tr><td colspan="3" style="padding:30px; color:var(--text-sub); font-weight:500;">현재 임시 저장된 작업이 없습니다.</td></tr></tbody>
        </table>
    </div>
</div>

<div id="pdf-template">
    <h2 style="text-align:center; margin-top:0; margin-bottom:15px; font-size:24px;">하자보수 작업 완료 사진대지</h2>
    <table style="width:100%; border-collapse:collapse; border:2px solid #000; font-size:14px; margin-top:0;">
        <tr><td style="border:1px solid #000; padding:8px; background:#eee; font-weight:bold; width:15%;">일자</td><td id="pdf-date" style="border:1px solid #000; padding:8px; width:35%;"></td><td style="border:1px solid #000; padding:8px; background:#eee; font-weight:bold; width:15%;">시공업체</td><td id="pdf-contractor" style="border:1px solid #000; padding:8px; width:35%;"></td></tr>
        <tr><td style="border:1px solid #000; padding:8px; background:#eee; font-weight:bold;">현장명</td><td id="pdf-site" colspan="3" style="border:1px solid #000; padding:8px;"></td></tr>
        <tr><td style="border:1px solid #000; padding:8px; background:#eee; font-weight:bold;">동/호</td><td id="pdf-unit" style="border:1px solid #000; padding:8px;"></td><td style="border:1px solid #000; padding:8px; background:#eee; font-weight:bold;">위치</td><td id="pdf-loc" style="border:1px solid #000; padding:8px;"></td></tr>
        <tr><td style="border:1px solid #000; padding:8px; background:#eee; font-weight:bold;">설명</td><td id="pdf-desc" colspan="3" style="border:1px solid #000; padding:8px; height:50px;"></td></tr>
    </table>
    <div style="text-align:center; margin-top:15px;">
        <p style="font-weight:bold; margin-bottom:5px; font-size:16px;">[ 작 업 전 ]</p>
        <img id="pdf-p1" style="width:460px; height:340px; object-fit:contain; border:1px solid #000; display:block; margin:0 auto;">
    </div>
    <div style="text-align:center; margin-top:10px;">
        <p style="font-weight:bold; margin-bottom:5px; font-size:16px;">[ 작 업 후 ]</p>
        <img id="pdf-p2" style="width:460px; height:340px; object-fit:contain; border:1px solid #000; display:block; margin:0 auto;">
    </div>
</div>

<script>
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbyE1jMEzrix8xYu3_lgHUX8Oqm6TAtWP6RDZzZ2WFL9c6Crlz5BFTO7__JoFygqRwUD/exec"; 
    
    let cloudDB = {}; let currentSid = ""; let savedList = [];
    let editingIndex = -1; 

    window.onload = () => { getSites(); document.getElementById('today-date').value = new Date().toISOString().substring(0, 10); };

    async function getSites() {
        const s = document.getElementById('site-select');
        try {
            const r = await fetch(`${MY_GAS_URL}?mode=getSites&t=${new Date().getTime()}`);
            const j = await r.json();
            if(j.result==='success') {
                s.innerHTML = `<option value="">🏢 현장을 선택해주세요</option>`;
                j.sites.forEach(v => s.innerHTML += `<option value="${v.id}">${v.name}</option>`);
            } else { throw new Error(j.message); }
        } catch(e) { s.innerHTML = '<option value="">❌ 로드 실패 (로그인/권한 확인)</option>'; }
    }

    async function loadDB() {
        const s = document.getElementById('site-select'); currentSid = s.value; if(!currentSid) return;
        document.getElementById('site').value = s.options[s.selectedIndex].text;
        const d = document.getElementById('db-sheet'); d.innerHTML = '<option value="">⏳ 데이터 로딩 중...</option>';
        try {
            const r = await fetch(`${MY_GAS_URL}?targetId=${encodeURIComponent(currentSid)}&t=${new Date().getTime()}`);
            const j = await r.json();
            if(j.result==='success') {
                cloudDB = j.data; d.innerHTML = '<option value="">📑 공종을 선택하세요</option>';
                Object.keys(cloudDB).forEach(n => {
                    if (n !== "작업기록") { d.innerHTML += `<option value="${n}">${n}</option>`; }
                });
            } else { throw new Error(j.message); }
        } catch(e) { d.innerHTML = '<option value="">❌ 데이터 로드 실패</option>'; }
    }

    function search() {
        const sheet = document.getElementById('db-sheet').value, d = document.getElementById('dong').value.trim(), h = document.getElementById('ho').value.trim(), res = document.getElementById('search-results');
        if(!sheet || !d || !h) { res.style.display='none'; return; }
        const matches = (cloudDB[sheet] || []).filter(v => String(v.dong)===d && String(v.ho)===h);
        if(matches.length>0) {
            res.innerHTML = `<div style="padding:12px 16px; background:#f0f9ff; font-weight:700; font-size:13px; border-bottom:1px solid #e2e8f0; color:#0284c7;">🔍 일치하는 내역 ${matches.length}건</div>`;
            matches.forEach(v => res.innerHTML += `<div class="result-item" onclick='fill(${JSON.stringify(v).replace(/'/g,"&apos;")})'><strong style="color:var(--primary-dark);">📍 ${v.loc}</strong><span class="ellipsis">📝 ${v.desc}</span></div>`);
            res.style.display='block';
        } else res.style.display='none';
    }

    function fill(v) {
        ['loc','work','type','contractor','desc'].forEach(id => document.getElementById(id).value = v[id] || '');
        document.getElementById('search-results').style.display='none';
    }

    function proc(input, pId, tId) {
        if(input.files && input.files[0]) {
            const r = new FileReader(); r.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                    let w = img.width, h = img.height;
                    
                    if (pId === 'p3') {
                        let max = 1600; 
                        if(w > h) { if(w > max) { h *= max/w; w = max; } } 
                        else { if(h > max) { w *= max/h; h = max; } }
                        c.width = w; c.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        document.getElementById(pId).src = c.toDataURL('image/jpeg', 0.8);
                    } else {
                        let targetRatio = 4 / 3;
                        let sX = 0, sY = 0, sW = w, sH = h;
                        if (w / h > targetRatio) { sW = h * targetRatio; sX = (w - sW) / 2; } 
                        else { sH = w / targetRatio; sY = (h - sH) / 2; }
                        
                        c.width = 1200; c.height = 900; 
                        ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 1200, 900);
                        document.getElementById(pId).src = addWM(c);
                    }
                    
                    document.getElementById(pId).style.display='block'; 
                    document.getElementById(tId).style.display='none';
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function addWM(c) {
        const ctx = c.getContext('2d'), w = c.width, h = c.height;
        const bw = w * 0.45; const bh = h * 0.25; const x = 0, y = h - bh; 
        ctx.fillStyle = "white"; ctx.fillRect(x, y, bw, bh);
        ctx.lineWidth = 1; ctx.strokeStyle = "black"; ctx.strokeRect(x, y, bw, bh); 
        const rows = 5; const rowH = bh / rows; const colW = bw * 0.25; 
        ctx.font = `${Math.floor(rowH * 0.5)}px sans-serif`; ctx.fillStyle = "black"; ctx.textBaseline = "middle";
        
        const d = getD(); 
        const vls = [d.site, `${d.dong}동 ${d.ho}호`, (d.desc||"").substring(0,35), d.work, d.date];
        const lbls = ["현 장", "위 치", "내 용", "공 정", "일 자"];
        
        for(let i=0; i<rows; i++) {
            const curY = y + (rowH * i);
            if (i > 0) { ctx.beginPath(); ctx.moveTo(x, curY); ctx.lineTo(x + bw, curY); ctx.stroke(); }
            ctx.fillText(lbls[i], x + 10, curY + (rowH / 2)); 
            ctx.fillText(vls[i], x + colW + 10, curY + (rowH / 2));    
        }
        ctx.beginPath(); ctx.moveTo(x + colW, y); ctx.lineTo(x + colW, y + bh); ctx.stroke();
        return c.toDataURL('image/jpeg', 0.9);
    }

    function getD() { 
        return { 
            date: document.getElementById('today-date').value, site: document.getElementById('site').value, dong: document.getElementById('dong').value, ho: document.getElementById('ho').value, loc: document.getElementById('loc').value, work: document.getElementById('work').value, type: document.getElementById('type').value, contractor: document.getElementById('contractor').value, desc: document.getElementById('desc').value,
            p1: document.getElementById('p1').src, p2: document.getElementById('p2').src, p3: document.getElementById('p3').src 
        }; 
    }

    function saveLocal() {
        const d = getD(); if(!d.dong || !d.ho) return alert("동, 호수 정보를 입력하세요.");
        if (editingIndex > -1) { savedList[editingIndex] = d; } else { savedList.push(d); }
        updateTable(); clearInputs();
    }

    function updateTable() {
        const b = document.getElementById('list-body');
        b.innerHTML = savedList.length ? savedList.map((r, i) => 
            `<tr>
                <td style="font-weight:700; color:var(--text-sub);">${i+1}</td>
                <td style="text-align:left; padding-left:10px; word-break:keep-all; white-space:nowrap;">
                    <span style="font-weight:700;">${r.dong}동 ${r.ho}호</span>
                    <span style="color:var(--accent); font-weight:700; font-size:12px; background:#e0e7ff; padding:2px 6px; border-radius:4px; margin-left:4px; vertical-align:middle;">${r.work}</span>
                </td>
                <td style="padding-left:4px; padding-right:4px;">
                    <div style="display:flex; gap:4px; justify-content:center;">
                        <button class="action-btn" onclick="loadLocal(${i})">불러오기</button>
                        <button class="action-btn del" onclick="delLocal(${i})">삭제</button>
                    </div>
                </td>
            </tr>`
        ).join('') : '<tr><td colspan="3" style="padding:30px; color:var(--text-sub); font-weight:500;">현재 임시 저장된 작업이 없습니다.</td></tr>';
        document.getElementById('count').innerText = savedList.length;
    }
    
    function loadLocal(i) {
        const d = savedList[i];
        document.getElementById('today-date').value = d.date; document.getElementById('dong').value = d.dong; document.getElementById('ho').value = d.ho; document.getElementById('loc').value = d.loc; document.getElementById('work').value = d.work; document.getElementById('type').value = d.type; document.getElementById('contractor').value = d.contractor; document.getElementById('desc').value = d.desc;
        
        [1, 2, 3].forEach(num => {
            const imgEl = document.getElementById('p' + num); const textEl = document.getElementById('t' + num); const imgSrc = d['p' + num];
            if (imgSrc && imgSrc.length > 100) { imgEl.src = imgSrc; imgEl.style.display = 'block'; textEl.style.display = 'none'; } 
            else { imgEl.src = ''; imgEl.style.display = 'none'; textEl.style.display = 'block'; }
        });
        editingIndex = i; 
        document.querySelector('.btn-save').innerHTML = "💾 수정 저장"; 
    }

    function clearInputs() { 
        ['dong','ho','loc','work','type','contractor','desc'].forEach(id => document.getElementById(id).value=''); 
        [1,2,3].forEach(i => { document.getElementById('p'+i).style.display='none'; document.getElementById('t'+i).style.display='block'; document.getElementById('p'+i).src=''; }); 
        editingIndex = -1; 
        document.querySelector('.btn-save').innerHTML = "💾 임시 저장"; 
    }

    function resetAfterSend() {
        ['dong','ho','loc','type','contractor','desc'].forEach(id => document.getElementById(id).value=''); 
        [1,2,3].forEach(i => { document.getElementById('p'+i).style.display='none'; document.getElementById('t'+i).style.display='block'; document.getElementById('p'+i).src=''; }); 
        editingIndex = -1; 
        document.querySelector('.btn-save').innerHTML = "💾 임시 저장"; 
    }

    function delLocal(i) { 
        savedList.splice(i, 1); 
        if (editingIndex === i) clearInputs(); 
        else if (editingIndex > i) editingIndex--; 
        updateTable(); 
    }

    async function send() {
        const d = getD();
        if(!currentSid || !d.dong || !d.ho) return alert("현장 및 정보를 확인하세요.");
        
        // 💡 핵심 1: 전송 버튼을 누르면 화면 전체를 가리는 로딩창을 띄웁니다.
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';
        
        try {
            document.getElementById('pdf-date').innerText = d.date; document.getElementById('pdf-contractor').innerText = d.contractor;
            document.getElementById('pdf-site').innerText = d.site; document.getElementById('pdf-unit').innerText = `${d.dong}동 ${d.ho}호`;
            document.getElementById('pdf-loc').innerText = d.loc; document.getElementById('pdf-desc').innerText = d.desc;
            document.getElementById('pdf-p1').src = d.p1 || ""; document.getElementById('pdf-p2').src = d.p2 || "";
            
            // 💡 핵심 2: PDF 도화지를 숨기지 않고 화면 맨 위에 정상적으로 띄웁니다. (대신 로딩창이 그 위를 덮어서 가려줍니다)
            const el = document.getElementById('pdf-template'); 
            el.style.display = 'block'; 
            
            // 화면 렌더링을 위해 아주 잠깐(0.1초) 기다린 후 캡처 시작
            setTimeout(async () => {
                try {
                    const pdf = await html2pdf().set({ 
                        margin: 0, filename: `보고서_${d.dong}동_${d.ho}호.pdf`, image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, scrollY: 0, windowWidth: 794 }, 
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                    }).from(el).output('datauristring');
                    
                    el.style.display = 'none'; // 캡처가 끝나면 다시 숨김

                    const payload = { targetSheetId: currentSid, record: d, pdfBase64: pdf.split(',')[1], p1Base64: (d.p1||"").split(',')[1]||"", p2Base64: (d.p2||"").split(',')[1]||"", p3Base64: (d.p3||"").split(',')[1]||"" };
                    const r = await fetch(MY_GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const j = await r.json();
                    
                    overlay.style.display = 'none'; // 전송 완료 후 로딩창 제거
                    
                    if(j.result==='success') { 
                        alert("🎉 성공적으로 전송되었습니다!"); 
                        if (editingIndex > -1) { savedList.splice(editingIndex, 1); updateTable(); }
                        resetAfterSend(); 
                    } else {
                        alert("❌ 서버 오류: " + j.message);
                    }
                } catch(e) {
                    overlay.style.display = 'none';
                    el.style.display = 'none';
                    alert("❌ PDF 캡처 중 오류가 발생했습니다."); 
                }
            }, 100);

        } catch(e) { 
            overlay.style.display = 'none';
            alert("❌ 전송 준비 중 오류가 발생했습니다."); 
        }
    }
</script>
</body>
</html>
