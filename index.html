<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>(주)METRO R&S 현장관리 시스템 V5.8</title>
    
    <script>
        var userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.indexOf("kakaotalk") !== -1) {
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
            setTimeout(function() {
                alert("🚨 카카오톡에서는 현장 시스템이 정상 작동하지 않습니다.\n\n우측 하단의 [점 3개(설정)] 버튼을 눌러\n반드시 [다른 브라우저로 열기]를 선택해 주세요!");
            }, 1000);
        }
    </script>

    <meta property="og:title" content="(주)METRO R&S 현장관리 시스템">
    <meta property="og:description" content="현장 사진 촬영부터 PDF 사진대지 자동 생성, 구글 드라이브 분류까지 한 번에 처리하는 통합 솔루션">
    <meta property="og:image" content="https://metro-corp.github.io/og-image.png">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-body: #f4f7f9; --surface: #ffffff; --primary-dark: #0f172a; --primary-light: #1e3a8a; 
            --accent: #3b82f6; --accent-hover: #2563eb; --success: #10b981; --danger: #ef4444; 
            --text-main: #0f172a; --text-sub: #64748b; --border-light: #e2e8f0; --input-bg: #f8fafc;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.04); --shadow-hover: 0 14px 40px rgba(0,0,0,0.08);
        }

        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg-body); font-size: 15px; color: var(--text-main); padding-bottom: 60px; line-height: 1.5; }
        header { background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); color: white; padding: 18px; font-weight: 700; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 17px; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .section { background: var(--surface); padding: 24px; border-radius: 20px; margin-bottom: 20px; box-shadow: var(--shadow-soft); border: 1px solid rgba(255,255,255,0.8); }
        .section-title { font-weight: 800; color: var(--primary-dark); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; font-size: 16px; border-bottom: 2px solid var(--border-light); padding-bottom: 12px; }
        .section-title span { background: #e0e7ff; color: var(--accent); padding: 4px 8px; border-radius: 8px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .full { grid-column: span 2; }
        input, select, textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-light); border-radius: 12px; box-sizing: border-box; background-color: var(--input-bg); font-family: inherit; font-size: 15px; color: var(--text-main); transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background-color: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
        textarea { resize: vertical; min-height: 100px; }
        #site-select { font-weight: 700; color: var(--accent-hover); background-color: #f0f9ff; border-color: #bae6fd; font-size: 16px; }
        #db-sheet { font-weight: 700; color: var(--success); background-color: #ecfdf5; border-color: #a7f3d0; }

        .toggle-btn-group { display: flex; gap: 10px; background: var(--input-bg); padding: 8px; border-radius: 14px; border: 1.5px solid var(--border-light); }
        .toggle-btn-group label { flex: 1; text-align: center; padding: 10px; font-weight: 700; font-size: 14px; color: var(--text-sub); cursor: pointer; border-radius: 10px; transition: all 0.2s; }
        .toggle-btn-group input[type="radio"] { display: none; }
        .toggle-btn-group input[type="radio"]:checked + span { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); display: block; padding: 10px; border-radius: 10px; margin: -10px; }

        #search-results { display: none; background: #fff; border: 2px solid #bae6fd; border-radius: 12px; margin-top: -5px; margin-bottom: 15px; grid-column: span 2; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2); position: relative; overflow: hidden; padding-bottom: 10px; }
        .result-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; text-align: left; transition: background 0.2s; }
        .result-item:hover { background: #f0f9ff; }
        .result-item strong { display: block; font-size: 15px; color: var(--primary-dark); margin-bottom: 6px; }
        .ellipsis { white-space: normal; display: block; color: var(--text-sub); font-size: 14px; line-height: 1.4; word-break: keep-all; } 

        .photo-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .photo-box { background: var(--input-bg); aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #cbd5e1; border-radius: 14px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s; color: var(--text-sub); font-weight: 600; font-size: 13px; text-align: center; padding: 5px; }
        .photo-box:hover { border-color: var(--accent); background: #f0f9ff; color: var(--accent); }
        .photo-box span { margin-top: 5px; display: inline-block; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; z-index: 10; border-radius: 12px; }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        button { padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; font-size: 15px; font-family: inherit; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; white-space: nowrap; }
        button:active { transform: scale(0.97); }
        .btn-save { background: var(--success); flex: 1; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-send { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); flex: 2; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; margin-top: 15px; }
        th, td { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border-light); }
        th { background: var(--input-bg); font-weight: 700; color: var(--primary-dark); }
        th:first-child { border-top-left-radius: 12px; } th:last-child { border-top-right-radius: 12px; }
        tr:last-child td { border-bottom: none; }
        
        .action-btn { background: #e2e8f0; color: var(--primary-dark); padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; flex: 1; white-space: nowrap; word-break: keep-all; }
        .action-btn.del { background: #fee2e2; color: var(--danger); }

        #pdf-template { 
            display: none; width: 794px; height: 1122px; padding: 40px 40px 80px 40px; 
            background: white; font-family: 'Malgun Gothic', sans-serif; box-sizing: border-box; margin: 0 auto; 
        }
        
        #generating-badge { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary-dark); color: white; padding: 14px 28px; border-radius: 30px; font-weight: 800; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-size: 16px; white-space: nowrap; }

        #custom-alert {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); z-index: 10005; backdrop-filter: blur(3px);
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
            opacity: 0; transition: opacity 0.2s ease;
        }
        #custom-alert.show { display: flex; opacity: 1; }
        .custom-alert-box {
            background: white; padding: 25px 20px 20px; border-radius: 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 320px; width: 100%;
            transform: translateY(20px) scale(0.95); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #custom-alert.show .custom-alert-box { transform: translateY(0) scale(1); }
        .custom-alert-msg { font-size: 16px; font-weight: 700; color: var(--primary-dark); margin-bottom: 22px; line-height: 1.5; white-space: pre-wrap; word-break: keep-all; }
        .custom-alert-btn { background: var(--accent); color: white; border: none; padding: 14px 0; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }
        .custom-alert-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="custom-alert">
    <div class="custom-alert-box">
        <div class="custom-alert-msg" id="alert-msg">메시지 내용</div>
        <button class="custom-alert-btn" onclick="closeAlert()">확인</button>
    </div>
</div>

<div id="generating-badge">⏳ 문서 생성 및 전송 중...</div>

<header>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
        <img src="logo.png" alt="METRO" style="height: 24px; border-radius: 4px;" onerror="this.src='https://placehold.co/100x30/0f172a/white?text=METRO+R%26S'">
        <span>(주)METRO R&S 현장관리 시스템 V5.8</span>
    </div>
</header>

<div class="container">
    <div class="section">
        <div class="section-title"><span>1</span> 현장 선택</div>
        <select id="site-select" onchange="loadDB()" class="full">
            <option value="">⏳ 현장 목록을 불러오는 중입니다...</option>
        </select>
    </div>

    <div class="section">
        <div class="section-title"><span>2</span> 작업 정보 입력</div>
        <div class="grid">
            <input type="date" id="today-date" class="full">
            <select id="db-sheet" onchange="clearInputs(false)" class="full"><option value="">현장을 먼저 선택해주세요</option></select>
            
            <input type="text" id="site" placeholder="현장명" readonly class="full" style="background-color: #e2e8f0; color: #64748b; font-weight:600;">
            
            <div class="full toggle-btn-group">
                <label>
                    <input type="radio" name="area-type" value="private" checked onchange="toggleArea()">
                    <span>🏠 세대 (전용부)</span>
                </label>
                <label>
                    <input type="radio" name="area-type" value="common" onchange="toggleArea()">
                    <span>🏢 공용부 및 기타</span>
                </label>
            </div>

            <input type="text" id="dong" placeholder="동" oninput="search()">
            <input type="text" id="ho" placeholder="호" oninput="search()">
            
            <div id="search-results"></div>
            
            <input type="text" id="loc" placeholder="위치">
            <input type="text" id="work" placeholder="공종">
            <input type="text" id="type" placeholder="하자 유형">
            <input type="text" id="contractor" placeholder="시공업체">
            <textarea id="desc" placeholder="상세 작업 내용을 입력하세요" class="full"></textarea>
        </div>
        
        <div class="section-title" style="margin-top: 25px; border:none; padding-bottom:0;"><span>3</span> 현장 사진 첨부</div>
        <div class="photo-area">
            <div class="photo-box" onclick="document.getElementById('f1').click()">
                <div id="t1" style="pointer-events: none;">
                    <div style="font-size: 24px;">📷</div><span>작업 전</span>
                </div>
                <img id="p1" class="preview-img"><input type="file" id="f1" hidden accept="image/*" onchange="proc(this,'p1','t1')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f2').click()">
                <div id="t2" style="pointer-events: none;">
                    <div style="font-size: 24px;">📷</div><span>작업 후</span>
                </div>
                <img id="p2" class="preview-img"><input type="file" id="f2" hidden accept="image/*" onchange="proc(this,'p2','t2')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f3').click()">
                <div id="t3" style="pointer-events: none;">
                    <div style="font-size: 24px;">📋</div><span>완료확인서</span>
                </div>
                <img id="p3" class="preview-img"><input type="file" id="f3" hidden accept="image/*" onchange="proc(this,'p3','t3')">
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-save" onclick="saveLocal()">💾 수정 저장</button>
            <button class="btn-send" id="btn-send" onclick="send()">🚀 최종 전송</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title"><span>목록</span> 임시 저장 내역 (<span id="count" style="color:var(--accent);">0</span>건)</div>
        <table>
            <thead><tr><th style="width:10%">No</th><th style="width:50%">작업 장소 (공종)</th><th style="width:40%">관리</th></tr></thead>
            <tbody id="list-body"><tr><td colspan="3" style="padding:30px; color:var(--text-sub); font-weight:500;">현재 임시 저장된 작업이 없습니다.</td></tr></tbody>
        </table>
    </div>
</div>

<div id="pdf-template">
    <p style="text-align: center; font-size: 26px; font-weight: 900; margin-top: 0; margin-bottom: 25px; letter-spacing: 15px; font-family: 'Malgun Gothic', sans-serif;">사 진 대 지</p>

    <table style="width:100%; height: 100%; border-collapse:collapse; border:2px solid #000; font-size:14px; margin-top:0;">
        <tr style="height: 40px;">
            <td style="border:1px solid #000; padding:10px; background:#f4f4f4; font-weight:bold; width:15%; text-align:center;">현장명</td>
            <td id="pdf-site" colspan="3" style="border:1px solid #000; padding:10px; text-align:center; font-weight:bold; font-size:15px;"></td>
        </tr>
        <tr style="height: 40px;">
            <td id="pdf-unit-label" style="border:1px solid #000; padding:10px; background:#f4f4f4; font-weight:bold; width:15%; text-align:center;">동/호</td>
            <td id="pdf-unit" style="border:1px solid #000; padding:10px; width:35%; text-align:left;"></td>
            <td style="border:1px solid #000; padding:10px; background:#f4f4f4; font-weight:bold; width:15%; text-align:center;">위치</td>
            <td id="pdf-loc" style="border:1px solid #000; padding:10px; width:35%; text-align:left;"></td>
        </tr>
        <tr style="height: 40px;">
            <td style="border:1px solid #000; padding:10px; background:#f4f4f4; font-weight:bold; text-align:center;">공종</td>
            <td id="pdf-work" style="border:1px solid #000; padding:10px; text-align:left;"></td>
            <td style="border:1px solid #000; padding:10px; background:#f4f4f4; font-weight:bold; text-align:center;">시공업체</td>
            <td id="pdf-contractor" style="border:1px solid #000; padding:10px; text-align:left;"></td>
        </tr>
        <tr style="height: 40px;">
            <td style="border:1px solid #000; padding:10px; background:#f4f4f4; font-weight:bold; text-align:center;">일자</td>
            <td id="pdf-date" colspan="3" style="border:1px solid #000; padding:10px; text-align:left;"></td>
        </tr>
        <tr>
            <td style="border:1px solid #000; padding:10px; background:#f4f4f4; font-weight:bold; text-align:center;">내용</td>
            <td id="pdf-desc" colspan="3" style="border:1px solid #000; padding:10px; text-align:left; vertical-align:top;"></td>
        </tr>
        <tr>
            <td colspan="4" style="border:1px solid #000; padding: 15px 0; text-align: center; vertical-align: middle; height: 350px;">
                <p style="font-weight:900; margin-top:0; margin-bottom:8px; font-size:16px;">[ 작 업 전 ]</p>
                <img id="pdf-p1" style="width:480px; height:300px; object-fit:contain; display:block; margin:0 auto;">
            </td>
        </tr>
        <tr>
            <td colspan="4" style="border:1px solid #000; padding: 15px 0; text-align: center; vertical-align: middle; height: 350px;">
                <p style="font-weight:900; margin-top:0; margin-bottom:8px; font-size:16px;">[ 작 업 후 ]</p>
                <img id="pdf-p2" style="width:480px; height:300px; object-fit:contain; display:block; margin:0 auto;">
            </td>
        </tr>
    </table>
</div>

<script>
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbyE1jMEzrix8xYu3_lgHUX8Oqm6TAtWP6RDZzZ2WFL9c6Crlz5BFTO7__JoFygqRwUD/exec"; 
    
    let cloudDB = {}; let currentSid = ""; let savedList = [];
    let editingIndex = -1; 
    let isProcessingImage = false; 

    function toggleArea() {
        const type = document.querySelector('input[name="area-type"]:checked').value;
        const dongInput = document.getElementById('dong');
        const hoInput = document.getElementById('ho');
        
        if (type === 'private') {
            dongInput.placeholder = "동";
            dongInput.classList.remove('full');
            hoInput.style.display = "block";
            if(hoInput.value === "-") hoInput.value = ""; 
        } else {
            dongInput.placeholder = "공용부 상세 위치 (예: 지하 1층 주차장, 101동 공용현관)";
            dongInput.classList.add('full');
            hoInput.style.display = "none";
            hoInput.value = "-"; 
        }
    }

    function showMsg(msg) {
        document.getElementById('alert-msg').innerText = msg;
        const alertEl = document.getElementById('custom-alert');
        alertEl.style.display = 'flex';
        setTimeout(() => alertEl.classList.add('show'), 10);
    }

    function closeAlert() {
        const alertEl = document.getElementById('custom-alert');
        alertEl.classList.remove('show');
        setTimeout(() => alertEl.style.display = 'none', 200);
    }

    window.onload = async () => { 
        document.getElementById('today-date').value = new Date().toISOString().substring(0, 10);
        
        let list = localStorage.getItem('metro_savedList');
        if(list) { savedList = JSON.parse(list); updateTable(); }

        await getSites();

        let auto = localStorage.getItem('metro_autoSave');
        if(auto) {
            let d = JSON.parse(auto);
            
            if(d.ho === "-") { document.querySelector('input[name="area-type"][value="common"]').checked = true; } 
            else { document.querySelector('input[name="area-type"][value="private"]').checked = true; }
            toggleArea();

            ['date','dong','ho','loc','work','type','contractor','desc'].forEach(id => {
                if(document.getElementById(id) && d[id]) document.getElementById(id).value = d[id];
            });
            [1,2,3].forEach(i => {
                if(d['p'+i] && d['p'+i].length > 100) {
                    let imgEl = document.getElementById('p'+i);
                    imgEl.src = d['p'+i];
                    imgEl.dataset.raw = d['p'+i+'_raw'] || ""; 
                    imgEl.dataset.wm = d['p'+i+'_wm'] !== undefined ? d['p'+i+'_wm'] : "true";
                    imgEl.style.display = 'block';
                    document.getElementById('t'+i).style.display = 'none';
                }
            });
            
            if(d.sid) {
                document.getElementById('site-select').value = d.sid;
                currentSid = d.sid;
                if(d.site) document.getElementById('site').value = d.site;
                await loadDB(); 
                if(d.workSheet) document.getElementById('db-sheet').value = d.workSheet;
            }
        }

        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('input', autoSave);
            el.addEventListener('change', autoSave);
        });
    };

    function autoSave() {
        let d = getD();
        d.sid = currentSid;
        d.workSheet = document.getElementById('db-sheet').value;
        try {
            localStorage.setItem('metro_autoSave', JSON.stringify(d));
        } catch(e) { console.warn("저장 공간 부족"); }
    }

    async function getSites() {
        const s = document.getElementById('site-select');
        try {
            const r = await fetch(`${MY_GAS_URL}?mode=getSites&t=${new Date().getTime()}`);
            const j = await r.json();
            if(j.result==='success') {
                s.innerHTML = `<option value="">🏢 현장을 선택해주세요</option>`;
                j.sites.forEach(v => s.innerHTML += `<option value="${v.id}">${v.name}</option>`);
            }
        } catch(e) { s.innerHTML = '<option value="">❌ 로드 실패</option>'; }
    }

    async function loadDB() {
        const s = document.getElementById('site-select'); currentSid = s.value; if(!currentSid) return;
        document.getElementById('site').value = s.options[s.selectedIndex].text;
        const d = document.getElementById('db-sheet'); d.innerHTML = '<option value="">⏳ 로딩 중...</option>';
        try {
            const r = await fetch(`${MY_GAS_URL}?targetId=${encodeURIComponent(currentSid)}&t=${new Date().getTime()}`);
            const j = await r.json();
            if(j.result==='success') {
                cloudDB = j.data; d.innerHTML = '<option value="">📑 공종 선택</option>';
                Object.keys(cloudDB).forEach(n => {
                    if (n !== "작업기록" && n !== "전체_공정_마스터") d.innerHTML += `<option value="${n}">${n}</option>`;
                });
            }
        } catch(e) { d.innerHTML = '<option value="">❌ 실패</option>'; }
    }

    function search() {
        const sheet = document.getElementById('db-sheet').value, d = document.getElementById('dong').value.trim(), h = document.getElementById('ho').value.trim(), res = document.getElementById('search-results');
        const isCommon = document.querySelector('input[name="area-type"]:checked').value === 'common';
        
        if(!sheet || !d || (!isCommon && !h)) { res.style.display='none'; return; }
        
        const matches = (cloudDB[sheet] || []).filter(v => {
            if (isCommon) return String(v.dong).includes(d) && String(v.ho) === "-";
            return String(v.dong) === d && String(v.ho) === h;
        });

        if(matches.length>0) {
            let htmlStr = `<div style="position:sticky; top:0; background:rgba(240, 249, 255, 0.95); backdrop-filter:blur(5px); padding:12px 16px; font-weight:800; font-size:14px; border-bottom:2px solid #bae6fd; color:#0284c7; display:flex; justify-content:space-between; align-items:center; z-index:100;">
                <span>🔍 내역 ${matches.length}건</span>
                <span onclick="document.getElementById('search-results').style.display='none'" style="background:#0ea5e9; padding:6px 14px; border-radius:8px; cursor:pointer; color:#ffffff; font-weight:700;">닫기 ✕</span>
            </div>`;
            matches.forEach(v => {
                htmlStr += `<div class="result-item" onclick='fill(${JSON.stringify(v).replace(/'/g,"&apos;")})'>
                    <strong>📍 ${v.loc}</strong><span class="ellipsis">📝 ${v.desc}</span></div>`;
            });
            res.innerHTML = htmlStr; res.style.display='block';
        } else res.style.display='none';
    }

    function fill(v) {
        ['loc','work','type','contractor','desc'].forEach(id => document.getElementById(id).value = v[id] || '');
        document.getElementById('search-results').style.display='none';
        autoSave();
    }

    function proc(input, pId, tId) {
        if(input.files && input.files[0]) {
            let applyWm = true;
            if(pId === 'p1' || pId === 'p2') {
                applyWm = confirm("📷 사진에 현장 정보(워터마크)를 추가하시겠습니까?\n\n[확인] 워터마크 표기\n[취소] 원본 사진 유지");
            }
            
            isProcessingImage = true; 
            const txt = document.getElementById(tId);
            const originalLabel = pId === 'p1' ? '작업 전' : (pId === 'p2' ? '작업 후' : '완료확인서');
            
            txt.innerHTML = "<div style='font-size: 24px;'>⏳</div><span>처리중...</span>";
            txt.style.display = 'block';
            document.getElementById(pId).style.display = 'none';

            const r = new FileReader(); r.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                    let w = img.width, h = img.height;
                    
                    if (pId === 'p3') {
                        let max = 1600; 
                        if(w > h) { if(w > max) { h *= max/w; w = max; } } 
                        else { if(h > max) { w *= max/h; h = max; } }
                        c.width = w; c.height = h; ctx.drawImage(img, 0, 0, w, h);
                        document.getElementById(pId).src = c.toDataURL('image/jpeg', 0.8); 
                    } else {
                        let targetRatio = 4 / 3; let sX = 0, sY = 0, sW = w, sH = h;
                        if (w / h > targetRatio) { sW = h * targetRatio; sX = (w - sW) / 2; } 
                        else { sH = w / targetRatio; sY = (h - sH) / 2; }
                        c.width = 1200; c.height = 900; ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 1200, 900);
                        
                        document.getElementById(pId).dataset.raw = c.toDataURL('image/jpeg', 0.8);
                        document.getElementById(pId).dataset.wm = applyWm ? "true" : "false";
                        
                        if(applyWm) { document.getElementById(pId).src = addWM(c); } 
                        else { document.getElementById(pId).src = document.getElementById(pId).dataset.raw; }
                    }
                    
                    document.getElementById(pId).style.display='block'; 
                    txt.style.display='none';
                    txt.innerHTML = `<div style="font-size: 24px;">${pId==='p3'?'📋':'📷'}</div><span>${originalLabel}</span>`;
                    
                    isProcessingImage = false; 
                    autoSave(); 
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function addWM(c) {
        const ctx = c.getContext('2d'), w = c.width, h = c.height;
        const bw = w * 0.45; const colW = bw * 0.25; const maxTextWidth = bw - colW - 20; 

        const fontSize = 18; ctx.font = `${fontSize}px sans-serif`;
        ctx.fillStyle = "black"; ctx.textBaseline = "middle";

        const d = getD();
        const rawDesc = (d.desc || "").replace(/\n/g, ' '); 
        let descLines = []; let tempLine = '';
        
        for(let i = 0; i < rawDesc.length; i++) {
            let testLine = tempLine + rawDesc[i];
            if(ctx.measureText(testLine).width > maxTextWidth && i > 0) {
                descLines.push(tempLine); tempLine = rawDesc[i];
            } else { tempLine = testLine; }
        }
        if(tempLine) descLines.push(tempLine);
        if(descLines.length === 0) descLines.push("");
        if(descLines.length > 4) { descLines = descLines.slice(0, 4); descLines[3] = descLines[3].slice(0, -3) + "..."; }

        const baseRowH = 40; const descRowH = Math.max(baseRowH, descLines.length * 22 + 10); 
        const totalH = (baseRowH * 4) + descRowH; const x = 0, y = h - totalH; 

        ctx.fillStyle = "white"; ctx.fillRect(x, y, bw, totalH);
        ctx.lineWidth = 1; ctx.strokeStyle = "black"; ctx.strokeRect(x, y, bw, totalH);

        const locText = d.ho === "-" ? d.dong : `${d.dong}동 ${d.ho}호`;
        const vls = [d.site, locText, descLines, d.work, d.date];
        const lbls = ["현 장", "위 치", "내 용", "공 종", "일 자"];

        ctx.fillStyle = "black"; let curY = y;

        for(let i=0; i<5; i++) {
            let currentRowH = (i === 2) ? descRowH : baseRowH;
            if (i > 0) { ctx.beginPath(); ctx.moveTo(x, curY); ctx.lineTo(x + bw, curY); ctx.stroke(); }
            ctx.fillText(lbls[i], x + 10, curY + (currentRowH / 2));
            const textX = x + colW + 10;
            
            if (i === 2) {
                ctx.textBaseline = "top";
                let startY = curY + (currentRowH - (descLines.length * 22)) / 2;
                for(let j=0; j<descLines.length; j++) { ctx.fillText(descLines[j], textX, startY + (j * 22) + 2); }
                ctx.textBaseline = "middle";
            } else {
                let valText = vls[i];
                if(ctx.measureText(valText).width > maxTextWidth) {
                    while(ctx.measureText(valText + "...").width > maxTextWidth && valText.length > 0) { valText = valText.slice(0, -1); }
                    valText += "...";
                }
                ctx.fillText(valText, textX, curY + (currentRowH / 2));
            }
            curY += currentRowH;
        }
        ctx.beginPath(); ctx.moveTo(x + colW, y); ctx.lineTo(x + colW, y + totalH); ctx.stroke();
        return c.toDataURL('image/jpeg', 0.8); 
    }

    async function applyFinalWatermark() {
        return new Promise((resolve) => {
            let targets = ['p1', 'p2'].filter(id => document.getElementById(id).dataset.raw && document.getElementById(id).dataset.raw.length > 100 && document.getElementById(id).dataset.wm === "true");
            
            if(targets.length === 0) return resolve();

            let processed = 0;
            targets.forEach(pId => {
                const imgEl = document.getElementById(pId);
                const tempImg = new Image();
                tempImg.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = 1200; c.height = 900;
                    const ctx = c.getContext('2d');
                    ctx.drawImage(tempImg, 0, 0);
                    imgEl.src = addWM(c); 
                    processed++;
                    if(processed === targets.length) resolve();
                };
                tempImg.src = imgEl.dataset.raw;
            });
        });
    }

    function getD() { 
        return { 
            date: document.getElementById('today-date').value, site: document.getElementById('site').value, dong: document.getElementById('dong').value, ho: document.getElementById('ho').value, loc: document.getElementById('loc').value, work: document.getElementById('work').value, type: document.getElementById('type').value, contractor: document.getElementById('contractor').value, desc: document.getElementById('desc').value,
            p1: document.getElementById('p1').src, 
            p1_raw: document.getElementById('p1').dataset.raw || "", 
            p1_wm: document.getElementById('p1').dataset.wm || "true",
            p2: document.getElementById('p2').src, 
            p2_raw: document.getElementById('p2').dataset.raw || "",
            p2_wm: document.getElementById('p2').dataset.wm || "true",
            p3: document.getElementById('p3').src 
        }; 
    }

    async function saveLocal() {
        if(isProcessingImage) return showMsg("⏳ 아이폰 사진 처리가 진행 중입니다.\n1~2초만 기다리신 후 다시 눌러주세요!");
        
        document.getElementById('generating-badge').innerText = "⏳ 데이터 정리 중...";
        document.getElementById('generating-badge').style.display = 'block';
        await applyFinalWatermark(); 
        document.getElementById('generating-badge').style.display = 'none';

        const d = getD(); 
        if(!currentSid || !d.dong || !d.ho || !d.loc || !d.work || !d.type || !d.contractor || !d.desc) {
            return showMsg("🚨 필수 정보 누락!\n현장, 장소, 위치, 공종, 하자유형, 시공업체, 작업내용을 빠짐없이 입력해 주세요.");
        }

        if (editingIndex > -1) { savedList[editingIndex] = d; } else { savedList.push(d); }
        
        try {
            localStorage.setItem('metro_savedList', JSON.stringify(savedList));
            updateTable(); clearInputs(true);
        } catch(e) {
            showMsg("❌ 스마트폰 저장 공간이 가득 찼습니다.\n전송이 완료된 임시 목록을 먼저 삭제해 주세요!");
            if(editingIndex === -1) savedList.pop(); 
        }
    }

    function updateTable() {
        const b = document.getElementById('list-body');
        b.innerHTML = savedList.length ? savedList.map((r, i) => {
            const locText = r.ho === "-" ? r.dong : `${r.dong}동 ${r.ho}호`;
            return `<tr><td style="font-weight:700; color:var(--text-sub);">${i+1}</td>
                <td style="text-align:left; padding-left:10px; word-break:keep-all; white-space:nowrap;">
                    <span style="font-weight:700;">${locText}</span><span style="color:var(--accent); font-weight:700; font-size:12px; background:#e0e7ff; padding:2px 6px; border-radius:4px; margin-left:4px;">${r.work}</span>
                </td>
                <td style="padding-left:4px; padding-right:4px;">
                    <div style="display:flex; gap:4px; justify-content:center;">
                        <button class="action-btn" onclick="loadLocal(${i})">불러오기</button>
                        <button class="action-btn del" onclick="delLocal(${i})">삭제</button>
                    </div>
                </td></tr>`;
        }).join('') : '<tr><td colspan="3" style="padding:30px; color:var(--text-sub); font-weight:500;">현재 임시 저장된 작업이 없습니다.</td></tr>';
        document.getElementById('count').innerText = savedList.length;
    }
    
    function loadLocal(i) {
        const d = savedList[i];
        
        if(d.ho === "-") { document.querySelector('input[name="area-type"][value="common"]').checked = true; } 
        else { document.querySelector('input[name="area-type"][value="private"]').checked = true; }
        toggleArea();

        document.getElementById('today-date').value = d.date; document.getElementById('dong').value = d.dong; document.getElementById('ho').value = d.ho; document.getElementById('loc').value = d.loc; document.getElementById('work').value = d.work; document.getElementById('type').value = d.type; document.getElementById('contractor').value = d.contractor; document.getElementById('desc').value = d.desc;
        [1, 2].forEach(num => {
            const imgEl = document.getElementById('p' + num); const textEl = document.getElementById('t' + num); const imgSrc = d['p' + num];
            if (imgSrc && imgSrc.length > 100) { 
                imgEl.src = imgSrc; 
                imgEl.dataset.raw = d['p' + num + '_raw'] || ""; 
                imgEl.dataset.wm = d['p' + num + '_wm'] !== undefined ? d['p' + num + '_wm'] : "true"; 
                imgEl.style.display = 'block'; textEl.style.display = 'none'; 
            } else { 
                imgEl.src = ''; imgEl.dataset.raw = ''; imgEl.dataset.wm = "true"; imgEl.style.display = 'none'; textEl.style.display = 'block'; 
            }
        });
        
        if (d.p3 && d.p3.length > 100) { document.getElementById('p3').src = d.p3; document.getElementById('p3').style.display = 'block'; document.getElementById('t3').style.display = 'none'; } 
        else { document.getElementById('p3').src = ''; document.getElementById('p3').style.display = 'none'; document.getElementById('t3').style.display = 'block'; }
        
        editingIndex = i; 
        document.querySelector('.btn-save').innerHTML = "💾 수정 저장"; 
        autoSave(); 
    }

    function clearInputs(isFullClear) { 
        ['dong','ho','loc','work','type','contractor','desc'].forEach(id => document.getElementById(id).value=''); 
        
        document.querySelector('input[name="area-type"][value="private"]').checked = true;
        toggleArea();

        [1,2,3].forEach(i => { 
            let el = document.getElementById('p'+i);
            el.style.display='none'; el.src=''; el.dataset.raw=''; el.dataset.wm='true';
            document.getElementById('t'+i).style.display='block'; 
        }); 
        editingIndex = -1; 
        document.querySelector('.btn-save').innerHTML = "💾 임시 저장"; 
        if(isFullClear) localStorage.removeItem('metro_autoSave'); 
    }

    function resetAfterSend() {
        ['dong','ho','loc','type','contractor','desc'].forEach(id => document.getElementById(id).value=''); 
        
        document.querySelector('input[name="area-type"][value="private"]').checked = true;
        toggleArea();

        [1,2,3].forEach(i => { 
            let el = document.getElementById('p'+i);
            el.style.display='none'; el.src=''; el.dataset.raw=''; el.dataset.wm='true';
            document.getElementById('t'+i).style.display='block'; 
        }); 
        editingIndex = -1; 
        document.querySelector('.btn-save').innerHTML = "💾 임시 저장"; 
        autoSave(); 
    }

    function delLocal(i) { 
        savedList.splice(i, 1); 
        localStorage.setItem('metro_savedList', JSON.stringify(savedList));
        if (editingIndex === i) clearInputs(true); 
        else if (editingIndex > i) editingIndex--; 
        updateTable(); 
    }

    async function send() {
        if(isProcessingImage) return showMsg("⏳ 아이폰 사진 처리가 진행 중입니다.\n잠시만 기다리신 후 다시 눌러주세요!");
        const btn = document.getElementById('btn-send'); 
        
        const d_init = getD();
        
        if(!currentSid || !d_init.dong || !d_init.ho || !d_init.loc || !d_init.work || !d_init.type || !d_init.contractor || !d_init.desc) {
            return showMsg("🚨 필수 정보 누락!\n현장, 장소, 위치, 공종, 하자유형, 시공업체, 작업내용을 빠짐없이 입력해 주세요.");
        }
        
        btn.innerHTML = "⏳ 준비 중..."; btn.style.pointerEvents = "none"; btn.style.opacity = "0.8";
        
        document.querySelector('.container').style.display = 'none';
        document.querySelector('header').style.display = 'none';
        document.getElementById('generating-badge').style.display = 'block';
        document.getElementById('generating-badge').innerText = "⏳ 사진 정보 최신화 중...";
        window.scrollTo(0, 0);

        try {
            await applyFinalWatermark();
            
            const d = getD();
            
            let hasPhotos = (d.p1 && d.p1.length > 100) || (d.p2 && d.p2.length > 100);
            let pdfBase64Data = "";

            if (hasPhotos) {
                document.getElementById('generating-badge').innerText = "⏳ 사진대지 생성 중...";
                
                document.getElementById('pdf-site').innerText = d.site;
                
                if(d.ho === "-") {
                    document.getElementById('pdf-unit-label').innerText = "공용부";
                    document.getElementById('pdf-unit').innerText = d.dong;
                } else {
                    document.getElementById('pdf-unit-label').innerText = "동/호";
                    document.getElementById('pdf-unit').innerText = `${d.dong}동 ${d.ho}호`;
                }

                document.getElementById('pdf-loc').innerText = d.loc;
                document.getElementById('pdf-work').innerText = d.work; 
                document.getElementById('pdf-contractor').innerText = d.contractor;
                document.getElementById('pdf-date').innerText = d.date;
                document.getElementById('pdf-desc').innerText = d.desc;
                document.getElementById('pdf-p1').src = d.p1 || ""; 
                document.getElementById('pdf-p2').src = d.p2 || "";
                
                const el = document.getElementById('pdf-template'); 
                el.style.display = 'block'; 
                await new Promise(resolve => setTimeout(resolve, 600)); 

                const pdf = await html2pdf().set({ 
                    margin: 0, filename: `사진대지_${d.ho === "-" ? d.dong : d.dong + "동_" + d.ho + "호"}.pdf`, image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, scrollY: 0, windowWidth: 794 }, 
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                }).from(el).output('datauristring');
                
                el.style.display = 'none'; 
                pdfBase64Data = pdf.split(',')[1];
            } else {
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            document.getElementById('generating-badge').innerText = "🚀 서버에 전송 중입니다...";

            const payload = { 
                targetSheetId: currentSid, record: d, 
                pdfBase64: pdfBase64Data, 
                p1Base64: (d.p1||"").split(',')[1]||"", 
                p1RawBase64: (d.p1_wm === "true") ? (d.p1_raw||"").split(',')[1]||"" : "",
                p2Base64: (d.p2||"").split(',')[1]||"", 
                p2RawBase64: (d.p2_wm === "true") ? (d.p2_raw||"").split(',')[1]||"" : "",
                p3Base64: (d.p3||"").split(',')[1]||"" 
            };
            
            const r = await fetch(MY_GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const j = await r.json();
            
            document.querySelector('.container').style.display = 'block';
            document.querySelector('header').style.display = 'block';
            document.getElementById('generating-badge').style.display = 'none';

            if(j.result==='success') { 
                showMsg("🎉 성공적으로 전송되었습니다!"); 
                if (editingIndex > -1) { savedList.splice(editingIndex, 1); localStorage.setItem('metro_savedList', JSON.stringify(savedList)); updateTable(); }
                resetAfterSend(); 
                btn.innerHTML = "🚀 최종 전송"; btn.style.pointerEvents = "auto"; btn.style.opacity = "1"; 
            } else {
                showMsg("❌ 서버 오류: " + j.message);
                btn.innerHTML = "🚀 최종 전송"; btn.style.pointerEvents = "auto"; btn.style.opacity = "1"; 
            }
        } catch(e) {
            document.querySelector('.container').style.display = 'block';
            document.querySelector('header').style.display = 'block';
            document.getElementById('generating-badge').style.display = 'none';
            document.getElementById('pdf-template').style.display = 'none';
            showMsg("❌ 처리 중 오류가 발생했습니다."); 
            btn.innerHTML = "🚀 최종 전송"; btn.style.pointerEvents = "auto"; btn.style.opacity = "1"; 
        }
    }
</script>
