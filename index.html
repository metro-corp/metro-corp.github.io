<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 💡 버전 업데이트: V11.1 (전송 진행 상태 상세 안내 기능 추가) -->
    <title>(주)METRO R&S 현장관리 시스템 V11.1</title>
    
    <script>
        var userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.indexOf("kakaotalk") !== -1) {
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
            setTimeout(function() {
                alert("🚨 카카오톡에서는 현장 시스템이 정상 작동하지 않습니다.\n\n우측 하단의 [점 3개(설정)] 버튼을 눌러\n반드시 [다른 브라우저로 열기]를 선택해 주세요!");
            }, 1000);
        }
    </script>

    <meta property="og:title" content="(주)METRO R&S 현장관리 시스템">
    <meta property="og:description" content="현장 사진 촬영부터 사진대지 자동 생성, 구글 드라이브 분류까지 한 번에 처리하는 통합 솔루션">
    <meta property="og:image" content="https://metro-corp.github.io/og-image.png">
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-body: #f4f7f9; --surface: #ffffff; --primary-dark: #0f172a; --primary-light: #1e3a8a; 
            --accent: #3b82f6; --accent-hover: #2563eb; --success: #10b981; --danger: #ef4444; 
            --text-main: #0f172a; --text-sub: #64748b; --border-light: #e2e8f0; --input-bg: #f8fafc;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.04); --shadow-hover: 0 14px 40px rgba(0,0,0,0.08);
        }

        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg-body); font-size: 15px; color: var(--text-main); padding-bottom: 60px; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
        header { background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); color: white; padding: 18px; font-weight: 700; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 17px; }
        
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .section { background: var(--surface); padding: 24px; border-radius: 20px; margin-bottom: 20px; box-shadow: var(--shadow-soft); border: 1px solid rgba(255,255,255,0.8); }
        .section-title { font-weight: 800; color: var(--primary-dark); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; font-size: 16px; border-bottom: 2px solid var(--border-light); padding-bottom: 12px; }
        .section-title span { background: #e0e7ff; color: var(--accent); padding: 4px 8px; border-radius: 8px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .full { grid-column: span 2; }
        input, select, textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-light); border-radius: 12px; box-sizing: border-box; background-color: var(--input-bg); font-family: inherit; font-size: 15px; color: var(--text-main); transition: all 0.2s; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); background-color: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
        textarea { resize: vertical; min-height: 100px; }
        #site-select { font-weight: 700; color: var(--accent-hover); background-color: #f0f9ff; border-color: #bae6fd; font-size: 16px; }
        #db-sheet { font-weight: 700; color: var(--success); background-color: #ecfdf5; border-color: #a7f3d0; }

        .toggle-btn-group { display: flex; gap: 10px; background: var(--input-bg); padding: 8px; border-radius: 14px; border: 1.5px solid var(--border-light); }
        .toggle-btn-group label { flex: 1; text-align: center; padding: 10px; font-weight: 700; font-size: 14px; color: var(--text-sub); cursor: pointer; border-radius: 10px; transition: all 0.2s; }
        .toggle-btn-group input[type="radio"] { display: none; }
        .toggle-btn-group input[type="radio"]:checked + span { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); display: block; padding: 10px; border-radius: 10px; margin: -10px; }

        #search-results { display: none; background: #fff; border: 2px solid #bae6fd; border-radius: 12px; margin-top: -5px; margin-bottom: 15px; grid-column: span 2; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2); position: relative; overflow: hidden; padding-bottom: 10px; z-index: 50; }
        .result-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; text-align: left; transition: background 0.2s; }
        .result-item:hover { background: #f0f9ff; }
        .result-item strong { display: block; font-size: 15px; color: var(--primary-dark); margin-bottom: 6px; }
        .ellipsis { white-space: normal; display: block; color: var(--text-sub); font-size: 14px; line-height: 1.4; word-break: keep-all; } 

        .photo-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .photo-box { background: var(--input-bg); aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #cbd5e1; border-radius: 14px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s; color: var(--text-sub); font-weight: 600; font-size: 13px; text-align: center; padding: 5px; }
        .photo-box:hover { border-color: var(--accent); background: #f0f9ff; color: var(--accent); }
        .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; z-index: 10; border-radius: 12px; }

        #extra-photo-container { display: none; margin-top: 15px; border-top: 1.5px dashed var(--border-light); padding-top: 15px; }
        .btn-toggle-extra, .btn-toggle-sent { width: 100%; padding: 14px; background: #f1f5f9; border: 1.5px solid var(--border-light); border-radius: 14px; color: var(--text-sub); font-weight: 800; font-size: 14px; margin-top: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-toggle-extra:hover, .btn-toggle-sent:hover { background: #e2e8f0; color: var(--primary-dark); }
        
        .btn-history-search { width: 100%; background: #eef2ff; color: var(--accent); border: 1.5px solid #c7d2fe; padding: 14px; border-radius: 14px; font-weight: 800; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; box-sizing: border-box; }
        .btn-history-search:hover { background: #e0e7ff; border-color: var(--accent); }

        #sent-today-container { display: none; margin-top: 15px; padding-top: 15px; border-top: 1.5px dashed var(--border-light); }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        button { padding: 16px; border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; font-size: 15px; font-family: inherit; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; white-space: nowrap; }
        button:active { transform: scale(0.97); }
        .btn-save { background: var(--success); flex: 1; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-send { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); flex: 2; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; margin-top: 15px; }
        th, td { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border-light); }
        th { background: var(--input-bg); font-weight: 700; color: var(--primary-dark); }
        th:first-child { border-top-left-radius: 12px; } th:last-child { border-top-right-radius: 12px; }
        tr:last-child td { border-bottom: none; }
        
        .action-btn { background: #e2e8f0; color: var(--primary-dark); padding: 8px 12px; border-radius: 12px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: all 0.2s; flex: 1; white-space: nowrap; word-break: keep-all; }
        .action-btn.del { background: #fee2e2; color: var(--danger); }
        .action-btn.view { background: #e0f2fe; color: var(--accent-hover); }

        #generating-badge { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary-dark); color: white; padding: 14px 28px; border-radius: 30px; font-weight: 800; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-size: 14px; white-space: nowrap; text-align: center; line-height: 1.4; border: 2px solid var(--accent); }

        #custom-alert, #history-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 10005; backdrop-filter: blur(3px); justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; opacity: 0; transition: opacity 0.2s ease; }
        #custom-alert.show, #history-modal.show { display: flex; opacity: 1; }
        .custom-alert-box { background: white; padding: 25px 20px 20px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 320px; width: 100%; transform: translateY(20px) scale(0.95); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        #history-modal .custom-alert-box { max-width: 600px; padding: 0; border-radius: 24px; }
        #custom-alert.show .custom-alert-box, #history-modal.show .custom-alert-box { transform: translateY(0) scale(1); }
        .custom-alert-msg { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 22px; line-height: 1.5; white-space: pre-wrap; word-break: keep-all; }
        .custom-alert-btn { background: var(--accent); color: white; border: none; padding: 14px 0; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>

<div id="custom-alert">
    <div class="custom-alert-box">
        <div class="custom-alert-msg" id="alert-msg">메시지 내용</div>
        <button class="custom-alert-btn" onclick="closeAlert()">확인</button>
    </div>
</div>

<div id="history-modal">
    <div class="custom-alert-box" style="display:flex; flex-direction:column; max-height:85vh; width:95%;">
        <div style="background:var(--primary-dark); color:white; padding:18px; font-weight:900; font-size:17px; border-radius:24px 24px 0 0;">🔍 과거 작업 이력 결과</div>
        <div style="overflow-y:auto; flex:1; padding:15px; background:#fff;">
            <table style="margin-top:0; border-radius:0;">
                <thead style="position:sticky; top:0; z-index:10; background:#f8fafc;">
                    <tr><th style="width:28%">작업일</th><th style="width:42%">공종 내역</th><th style="width:30%">문서</th></tr>
                </thead>
                <tbody id="history-list-body">
                    <tr><td colspan="3" style="padding:40px; color:var(--text-sub);">조회된 기록이 없습니다.</td></tr>
                </tbody>
            </table>
        </div>
        <div style="padding:15px; border-top:1.5px solid var(--border-light); background:#f8fafc; border-radius:0 0 24px 24px;">
            <button class="custom-alert-btn" style="background:var(--text-sub);" onclick="closeHistory()">닫기</button>
        </div>
    </div>
</div>

<div id="generating-badge">🚀 전송 준비 중...</div>

<header>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
        <img src="logo.png" alt="METRO" style="height: 24px; border-radius: 4px;" onerror="this.src='https://placehold.co/100x30/0f172a/white?text=METRO+R%26S'">
        <span>(주)METRO R&S 현장관리 시스템 V11.1</span>
    </div>
</header>

<div class="container">
    <div class="section">
        <div class="section-title"><span>1</span> 현장 선택</div>
        <select id="site-select" onchange="loadDB()" class="full">
            <option value="">🏢 현장을 선택해주세요</option>
        </select>
    </div>

    <div class="section">
        <div class="section-title"><span>2</span> 작업 정보 입력</div>
        <div class="grid">
            <input type="date" id="today-date" class="full">
            <select id="db-sheet" onchange="clearInputs(false); autoSave();" class="full"><option value="">현장을 먼저 선택해주세요</option></select>
            
            <input type="text" id="site" placeholder="현장명" readonly class="full" style="background-color: #e2e8f0; color: #64748b; font-weight:600;">
            
            <div class="full toggle-btn-group">
                <label>
                    <input type="radio" name="area-type" value="private" checked onchange="toggleArea()">
                    <span>🏠 세대 (전용부)</span>
                </label>
                <label>
                    <input type="radio" name="area-type" value="common" onchange="toggleArea()">
                    <span>🏢 공용부 및 기타</span>
                </label>
            </div>

            <input type="text" id="dong" placeholder="동" oninput="search()">
            <input type="text" id="ho" placeholder="호" oninput="search()">
            
            <div id="search-results"></div>
            
            <input type="text" id="loc" placeholder="위치">
            <input type="text" id="work" placeholder="공종">
            <input type="text" id="type" placeholder="하자 유형">
            <input type="text" id="contractor" placeholder="시공업체">
            <textarea id="desc" placeholder="상세 작업 내용을 입력하세요" class="full"></textarea>
        </div>
        
        <div class="section-title" style="margin-top: 25px; border:none; padding-bottom:0;"><span>3</span> 현장 사진 첨부</div>
        <div class="photo-area">
            <div class="photo-box" onclick="document.getElementById('f1').click()">
                <div id="t1" style="pointer-events: none;"><div style="font-size: 24px;">📷</div><span>작업 전</span></div>
                <img id="p1" class="preview-img"><input type="file" id="f1" hidden accept="image/*" onchange="proc(this,'p1','t1','작업 전')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f2').click()">
                <div id="t2" style="pointer-events: none;"><div style="font-size: 24px;">📷</div><span>작업 후</span></div>
                <img id="p2" class="preview-img"><input type="file" id="f2" hidden accept="image/*" onchange="proc(this,'p2','t2','작업 후')">
            </div>
            <div class="photo-box" onclick="document.getElementById('f3').click()">
                <div id="t3" style="pointer-events: none;"><div style="font-size: 24px;">📋</div><span>완료확인서</span></div>
                <img id="p3" class="preview-img"><input type="file" id="f3" hidden accept="image/*" onchange="proc(this,'p3','t3','완료확인서')">
            </div>
        </div>

        <button class="btn-toggle-extra" id="btn-toggle-extra" onclick="toggleExtraPhotos()">
            <span id="toggle-icon-extra">➕</span> 추가 사진 등록 (9칸)
        </button>

        <div id="extra-photo-container">
            <div class="photo-area" style="grid-template-columns: repeat(3, 1fr); margin-top:10px;">
                <script>
                    for(let i=4; i<=12; i++) {
                        document.write(`
                            <div class="photo-box" onclick="document.getElementById('f${i}').click()">
                                <div id="t${i}" style="pointer-events: none;"><div style="font-size: 22px;">📷</div><span>추가${i}</span></div>
                                <img id="p${i}" class="preview-img"><input type="file" id="f${i}" hidden accept="image/*" onchange="proc(this,'p${i}','t${i}','추가${i}')">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-save" id="btn-save" onclick="saveLocal()">💾 임시 저장</button>
            <button class="btn-send" id="btn-send" onclick="send()">🚀 최종 전송</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title"><span>목록</span> 임시 저장 내역 (<span id="count" style="color:var(--accent);">0</span>건)</div>
        <table>
            <thead><tr><th style="width:10%">No</th><th style="width:50%">작업 장소 (공종)</th><th style="width:40%">관리</th></tr></thead>
            <tbody id="list-body"><tr><td colspan="3" style="padding:30px; color:var(--text-sub); font-weight:500;">현재 임시 저장된 작업이 없습니다.</td></tr></tbody>
        </table>

        <button class="btn-toggle-sent" onclick="toggleSentHistory()">
            <span id="toggle-icon-sent">🔽</span> 오늘 전송 완료 목록 (<span id="sent-count">0</span>)
        </button>

        <div id="sent-today-container">
            <table>
                <thead><tr><th style="width:10%">No</th><th style="width:50%">전송 완료 내역</th><th style="width:40%">상태</th></tr></thead>
                <tbody id="sent-list-body"><tr><td colspan="3" style="padding:20px; color:var(--text-sub); font-size:13px;">오늘 전송된 내역이 없습니다.</td></tr></tbody>
            </table>
        </div>

        <div style="margin-top:25px; padding-top:20px; border-top:2px solid var(--border-light);">
            <div class="section-title" style="border:none; margin-bottom:10px;"><span>🔍</span> 과거 작업 이력 검색</div>
            <p style="font-size:12px; color:var(--text-sub); margin-bottom:15px; margin-left:2px;">입력창과 무관하게 동/호수만으로 과거 기록을 조회합니다.</p>
            <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom:12px;">
                <input type="text" id="search-dong" placeholder="검색할 동">
                <input type="text" id="search-ho" placeholder="검색할 호수">
            </div>
            <button class="btn-history-search" onclick="loadHistory()">
                <span>🔍</span> 기록 조회하기
            </button>
        </div>
    </div>
</div>

<script>
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbyE1jMEzrix8xYu3_lgHUX8Oqm6TAtWP6RDZzZ2WFL9c6Crlz5BFTO7__JoFygqRwUD/exec"; 
    
    let cloudDB = {}; let currentSid = ""; let savedList = []; let sentTodayList = [];
    let editingIndex = -1; let isProcessingImage = false; 
    let isInitialLoad = true; 

    function toggleExtraPhotos() {
        const container = document.getElementById('extra-photo-container');
        const btnText = document.getElementById('btn-toggle-extra');
        if (container.style.display === 'block') {
            container.style.display = 'none';
            btnText.innerHTML = '<span>➕</span> 추가 사진 등록 (9칸)';
        } else {
            container.style.display = 'block';
            btnText.innerHTML = '<span>➖</span> 추가 사진 접기';
        }
    }

    function toggleSentHistory() {
        const container = document.getElementById('sent-today-container');
        const icon = document.getElementById('toggle-icon-sent');
        if (container.style.display === 'block') {
            container.style.display = 'none';
            icon.innerText = '🔽';
        } else {
            container.style.display = 'block';
            icon.innerText = '🔼';
        }
    }

    function closeHistory() {
        const modal = document.getElementById('history-modal');
        modal.classList.remove('show');
        setTimeout(() => modal.style.display = 'none', 200);
    }

    function toggleArea() {
        const type = document.querySelector('input[name="area-type"]:checked').value;
        const dongInput = document.getElementById('dong');
        const hoInput = document.getElementById('ho');
        if (type === 'private') {
            dongInput.placeholder = "동"; dongInput.classList.remove('full'); hoInput.style.display = "block"; if(hoInput.value === "-") hoInput.value = ""; 
        } else {
            dongInput.placeholder = "공용부 상세 위치 (예: 지하주차장)"; dongInput.classList.add('full'); hoInput.style.display = "none"; hoInput.value = "-"; 
        }
    }

    function showMsg(msg) { document.getElementById('alert-msg').innerText = msg; const alertEl = document.getElementById('custom-alert'); alertEl.style.display = 'flex'; setTimeout(() => alertEl.classList.add('show'), 10); }
    function closeAlert() { const alertEl = document.getElementById('custom-alert'); alertEl.classList.remove('show'); setTimeout(() => alertEl.style.display = 'none', 200); }

    window.onload = async () => { 
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const todayStr = `${year}-${month}-${day}`;
        document.getElementById('today-date').value = todayStr;
        
        let list = localStorage.getItem('metro_savedList'); if(list) { savedList = JSON.parse(list); updateTable(); }
        
        let sentList = localStorage.getItem('metro_sentListToday');
        if(sentList) {
            let parsed = JSON.parse(sentList);
            sentTodayList = parsed.filter(item => item.sentDate === todayStr);
            localStorage.setItem('metro_sentListToday', JSON.stringify(sentTodayList));
            updateSentTable();
        }

        const cachedSites = localStorage.getItem('metro_sites');
        if(cachedSites) {
            const s = document.getElementById('site-select');
            s.innerHTML = `<option value="">🏢 현장을 선택해주세요</option>`;
            JSON.parse(cachedSites).forEach(v => s.innerHTML += `<option value="${v.id}">${v.name}</option>`);
        }

        let auto = localStorage.getItem('metro_autoSave');
        if(auto) {
            let d = JSON.parse(auto);
            if(d.sid) { 
                document.getElementById('site-select').value = d.sid; currentSid = d.sid; 
                if(d.site) document.getElementById('site').value = d.site; 
                if(d.sheetList) {
                    const dbSheet = document.getElementById('db-sheet');
                    dbSheet.innerHTML = d.sheetList.map(o => `<option value="${o.value}">${o.text}</option>`).join('');
                }
                if(d.workSheet) document.getElementById('db-sheet').value = d.workSheet; 
            }
        }

        await getSites(); 
        if(currentSid) await loadDB();

        isInitialLoad = false; 
        document.querySelectorAll('input, select, textarea').forEach(el => { 
            el.addEventListener('input', autoSave); 
            el.addEventListener('change', autoSave); 
        });
    };

    function autoSave() { 
        if(isInitialLoad) return; 
        let d = getD(); 
        d.sid = currentSid; 
        d.workSheet = document.getElementById('db-sheet').value; 
        d.sheetList = Array.from(document.getElementById('db-sheet').options).map(o => ({value: o.value, text: o.text}));
        try { localStorage.setItem('metro_autoSave', JSON.stringify(d)); } catch(e) {} 
    }

    async function getSites() {
        const s = document.getElementById('site-select');
        try {
            const r = await fetch(`${MY_GAS_URL}?mode=getSites&t=${new Date().getTime()}`);
            const j = await r.json();
            if(j.result==='success') { 
                localStorage.setItem('metro_sites', JSON.stringify(j.sites));
                s.innerHTML = `<option value="">🏢 현장을 선택해주세요</option>`; 
                j.sites.forEach(v => s.innerHTML += `<option value="${v.id}">${v.name}</option>`); 
                if(currentSid) s.value = currentSid;
            }
        } catch(e) { s.innerHTML = '<option value="">❌ 로드 실패</option>'; }
    }

    async function loadDB() {
        const s = document.getElementById('site-select'); currentSid = s.value; if(!currentSid) return;
        const selectText = s.options[s.selectedIndex].text;
        document.getElementById('site').value = selectText;
        const d = document.getElementById('db-sheet'); 
        const currentVal = d.value;
        if(!isInitialLoad) d.innerHTML = '<option value="">⏳ 로딩 중...</option>';
        try {
            const r = await fetch(`${MY_GAS_URL}?targetId=${encodeURIComponent(currentSid)}&t=${new Date().getTime()}`);
            const j = await r.json();
            if(j.result==='success') {
                cloudDB = j.data; d.innerHTML = '<option value="">📑 공종 선택</option>';
                Object.keys(cloudDB).forEach(n => { if (n !== "작업기록" && n !== "전체_공정_마스터" && n !== "전체_공정마스터") d.innerHTML += `<option value="${n}">${n}</option>`; });
                if(currentVal) d.value = currentVal;
                autoSave(); 
            }
        } catch(e) { d.innerHTML = '<option value="">❌ 실패</option>'; }
    }

    async function loadHistory() {
        const dong = document.getElementById('search-dong').value.trim();
        const ho = document.getElementById('search-ho').value.trim();
        if(!currentSid) return showMsg("🏢 현장을 먼저 선택하세요.");
        if(!dong) return showMsg("🔢 검색할 동 번호를 입력하세요.");

        const listBody = document.getElementById('history-list-body');
        listBody.innerHTML = '<tr><td colspan="3" style="padding:40px;">⏳ 서버에서 기록을 찾는 중...</td></tr>';
        document.getElementById('history-modal').style.display = 'flex';
        setTimeout(() => document.getElementById('history-modal').classList.add('show'), 10);

        try {
            const r = await fetch(`${MY_GAS_URL}?mode=getHistory&targetId=${currentSid}&dong=${encodeURIComponent(dong)}&ho=${encodeURIComponent(ho)}&t=${Date.now()}`);
            const j = await r.json();
            if(j.result === 'success' && j.data.length > 0) {
                listBody.innerHTML = j.data.map(item => {
                    const formattedDate = item.date ? item.date.split('T')[0] : '날짜없음';
                    return `<tr>
                        <td style="font-size:12px; font-weight:700;">${formattedDate}</td>
                        <td style="text-align:left; font-size:12px;"><strong>${item.work}</strong><br><span style="color:var(--text-sub); font-size:11px;">${item.desc.substring(0,18)}...</span></td>
                        <td><a href="${item.pdf}" target="_blank" style="display:inline-block; padding:7px 12px; background:var(--accent); color:white; text-decoration:none; border-radius:10px; font-size:11px; font-weight:800; box-shadow:0 4px 10px rgba(59, 130, 246, 0.2);">보고서</a></td>
                    </tr>`;
                }).join('');
            } else {
                listBody.innerHTML = '<tr><td colspan="3" style="padding:40px; color:var(--text-sub);">해당 세대에 기록된 작업이 없습니다.</td></tr>';
            }
        } catch(e) {
            listBody.innerHTML = '<tr><td colspan="3" style="padding:40px; color:var(--danger);">❌ 로드 실패 (네트워크 확인)</td></tr>';
        }
    }

    function search() {
        const sheet = document.getElementById('db-sheet').value, d = document.getElementById('dong').value.trim(), h = document.getElementById('ho').value.trim(), res = document.getElementById('search-results');
        const isCommon = document.querySelector('input[name="area-type"]:checked').value === 'common';
        if(!sheet || !d || (!isCommon && !h)) { res.style.display='none'; return; }
        const matches = (cloudDB[sheet] || []).filter(v => {
            if (isCommon) return String(v.dong).includes(d) && String(v.ho) === "-";
            return String(v.dong) === d && String(v.ho) === h;
        });
        if(matches.length>0) {
            let htmlStr = `<div style="position:sticky; top:0; background:rgba(240, 249, 255, 0.95); backdrop-filter:blur(5px); padding:12px 16px; font-weight:800; font-size:14px; border-bottom:2px solid #bae6fd; color:#0284c7; display:flex; justify-content:space-between; align-items:center; z-index:100;"><span>🔍 내역 ${matches.length}건</span><span onclick="document.getElementById('search-results').style.display='none'" style="background:#0ea5e9; padding:6px 14px; border-radius:8px; cursor:pointer; color:#ffffff; font-weight:700;">닫기 ✕</span></div>`;
            matches.forEach(v => { htmlStr += `<div class="result-item" onclick='fill(${JSON.stringify(v).replace(/'/g,"&apos;")})'><strong>📍 ${v.loc}</strong><span class="ellipsis">📝 ${v.desc}</span></div>`; });
            res.innerHTML = htmlStr; res.style.display='block';
        } else res.style.display='none';
    }

    function fill(v) { ['loc','work','type','contractor','desc'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = v[id] || ''; }); document.getElementById('search-results').style.display='none'; autoSave(); }

    function proc(input, pId, tId, label) {
        if(input.files && input.files[0]) {
            let applyWm = (pId !== 'p3');
            isProcessingImage = true; const txt = document.getElementById(tId);
            txt.innerHTML = "<div style='font-size: 24px;'>⏳</div><span>처리중...</span>";
            txt.style.display = 'block'; document.getElementById(pId).style.display = 'none';
            const r = new FileReader(); r.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    let w = img.width, h = img.height;
                    let finalDataUrl = "";
                    if (pId === 'p3') {
                        let max = 1000; if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                        canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                        finalDataUrl = canvas.toDataURL('image/jpeg', 0.3);
                        document.getElementById(pId).src = finalDataUrl;
                    } else {
                        let targetRatio = 4 / 3; let sX = 0, sY = 0, sW = w, sH = h;
                        if (w / h > targetRatio) { sW = h * targetRatio; sX = (w - sW) / 2; } else { sH = w / targetRatio; sY = (h - sH) / 2; }
                        canvas.width = 800; canvas.height = 600; ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 800, 600);
                        document.getElementById(pId).dataset.raw = canvas.toDataURL('image/jpeg', 0.4);
                        document.getElementById(pId).dataset.wm = applyWm ? "true" : "false";
                        if(applyWm) { finalDataUrl = addWM(canvas); document.getElementById(pId).src = finalDataUrl; } 
                        else { finalDataUrl = document.getElementById(pId).dataset.raw; document.getElementById(pId).src = finalDataUrl; }
                    }
                    document.getElementById(pId).style.display='block'; txt.style.display='none';
                    txt.innerHTML = `<div style="font-size: 24px;">${pId==='p3'?'📋':'📷'}</div><span>${label}</span>`;
                    isProcessingImage = false; autoSave(); 
                }; img.src = e.target.result;
            }; r.readAsDataURL(input.files[0]);
        }
    }

    function addWM(c) {
        const ctx = c.getContext('2d'), w = c.width, h = c.height;
        const boxW = 460, rowH = 32, col1W = 90;
        const totalH = rowH * 5;
        const x = 0, y = h - totalH; 
        ctx.fillStyle = "rgba(255, 255, 255, 0.98)"; ctx.fillRect(x, y, boxW, totalH);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 1.2; ctx.strokeRect(x, y, boxW, totalH);
        for (let i = 1; i < 5; i++) { ctx.beginPath(); ctx.moveTo(x, y + (i * rowH)); ctx.lineTo(x + boxW, y + (i * rowH)); ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(x + col1W, y); ctx.lineTo(x + col1W, y + totalH); ctx.stroke();
        const d = getD();
        const labels = ["현 장", "위 치", "내 용", "공 종", "일 자"];
        const values = [d.site || "현장명", (d.ho === "-" ? d.dong : `${d.dong}동 ${d.ho}호`) || "위치", (d.desc.substring(0, 24) + (d.desc.length > 24 ? "..." : "")) || "작업내용", d.work || "공종", d.date || "날짜"];
        ctx.fillStyle = "#000"; ctx.font = "bold 14px sans-serif"; ctx.textBaseline = "middle";
        labels.forEach((lbl, i) => {
            ctx.textAlign = "center"; ctx.fillText(lbl, x + (col1W / 2), y + (i * rowH) + (rowH / 2));
            ctx.textAlign = "left"; ctx.fillText(values[i], x + col1W + 12, y + (i * rowH) + (rowH / 2));
        });
        return c.toDataURL('image/jpeg', 0.5);
    }

    function getD() { 
        let d = { date: document.getElementById('today-date').value, site: document.getElementById('site').value, sid: currentSid, workSheet: document.getElementById('db-sheet').value, dong: document.getElementById('dong').value, ho: document.getElementById('ho').value, loc: document.getElementById('loc').value, work: document.getElementById('work').value, type: document.getElementById('type').value, contractor: document.getElementById('contractor').value, desc: document.getElementById('desc').value, p1: document.getElementById('p1').src, p1_raw: document.getElementById('p1').dataset.raw || "", p1_wm: document.getElementById('p1').dataset.wm || "true", p2: document.getElementById('p2').src, p2_raw: document.getElementById('p2').dataset.raw || "", p2_wm: document.getElementById('p2').dataset.wm || "true", p3: document.getElementById('p3').src };
        for(let i=4; i<=12; i++) { let el = document.getElementById('p'+i); d['p'+i] = el.src; d['p'+i+'_raw'] = el.dataset.raw || ""; d['p'+i+'_wm'] = el.dataset.wm || "true"; }
        return d;
    }

    function saveLocal() {
        if(isProcessingImage) return showMsg("⏳ 사진 처리가 진행 중입니다.");
        const d = getD(); if(!currentSid || !d.dong || !d.ho || !d.work) return showMsg("🚨 필수 정보를 입력하세요.");
        if (editingIndex > -1) { savedList[editingIndex] = d; } else { savedList.push(d); }
        localStorage.setItem('metro_savedList', JSON.stringify(savedList)); updateTable(); clearInputs(true); 
    }

    function updateTable() {
        const b = document.getElementById('list-body');
        b.innerHTML = savedList.length ? savedList.map((r, i) => {
            const locText = r.ho === "-" ? r.dong : `${r.dong}동 ${r.ho}호`;
            return `<tr><td style="font-weight:700; color:var(--text-sub);">${i+1}</td>
                <td style="text-align:left; padding-left:10px; word-break:keep-all; white-space:nowrap;">
                    <span style="font-weight:700;">${locText}</span><span style="color:var(--accent); font-weight:700; font-size:12px; background:#e0e7ff; padding:2px 6px; border-radius:4px; margin-left:4px;">${r.work}</span>
                </td>
                <td style="padding-left:4px; padding-right:4px;">
                    <div style="display:flex; gap:4px; justify-content:center;">
                        <button class="action-btn" onclick="loadLocal(${i})">불러오기</button>
                        <button class="action-btn del" onclick="delLocal(${i})">삭제</button>
                    </div>
                </td></tr>`;
        }).join('') : '<tr><td colspan="3" style="padding:30px; color:var(--text-sub); font-weight:500;">현재 임시 저장된 작업이 없습니다.</td></tr>';
        document.getElementById('count').innerText = savedList.length;
    }

    function updateSentTable() {
        const b = document.getElementById('sent-list-body');
        const countEl = document.getElementById('sent-count');
        b.innerHTML = sentTodayList.length ? sentTodayList.map((r, i) => {
            const locText = r.ho === "-" ? r.dong : `${r.dong}동 ${r.ho}호`;
            return `<tr><td style="font-weight:700; color:var(--text-sub);">${i+1}</td>
                <td style="text-align:left; padding-left:10px; word-break:keep-all; white-space:nowrap;">
                    <span style="font-weight:700;">${locText}</span><span style="color:var(--success); font-weight:700; font-size:12px; background:#ecfdf5; padding:2px 6px; border-radius:4px; margin-left:4px;">${r.work}</span>
                </td>
                <td style="padding-left:4px; padding-right:4px;">
                    <div style="display:flex; gap:4px; justify-content:center;">
                        <button class="action-btn view" onclick="loadSent(${i})">상세보기</button>
                    </div>
                </td></tr>`;
        }).reverse().join('') : '<tr><td colspan="3" style="padding:20px; color:var(--text-sub); font-size:13px;">오늘 전송된 내역이 없습니다.</td></tr>';
        countEl.innerText = sentTodayList.length;
    }
    
    async function loadLocal(i) {
        const d = savedList[i]; editingIndex = i; await loadDataToForm(d);
        document.getElementById('btn-save').innerHTML = "💾 수정 저장"; 
    }

    async function loadSent(i) {
        const d = sentTodayList[sentTodayList.length - 1 - i]; await loadDataToForm(d);
        showMsg("ℹ️ 이 내역은 이미 전송이 완료된 작업입니다.");
    }

    async function loadDataToForm(d) {
        if (d.sid) {
            if (d.sid !== currentSid) { document.getElementById('site-select').value = d.sid; currentSid = d.sid; await loadDB(); }
            if (d.workSheet) { document.getElementById('db-sheet').value = d.workSheet; }
        }
        if(d.ho === "-") { document.querySelector('input[name="area-type"][value="common"]').checked = true; } else { document.querySelector('input[name="area-type"][value="private"]').checked = true; }
        toggleArea();
        document.getElementById('today-date').value = d.date; document.getElementById('dong').value = d.dong; document.getElementById('ho').value = d.ho; document.getElementById('loc').value = d.loc; document.getElementById('work').value = d.work; document.getElementById('type').value = d.type; document.getElementById('contractor').value = d.contractor; document.getElementById('desc').value = d.desc;
        for(let num=1; num<=12; num++) {
            const imgEl = document.getElementById('p' + num); const textEl = document.getElementById('t' + num); const imgSrc = d['p' + num];
            if (imgSrc && imgSrc.length > 100) { imgEl.src = imgSrc; imgEl.dataset.raw = d['p' + num + '_raw'] || ""; imgEl.dataset.wm = d['p' + num + '_wm'] !== undefined ? d['p' + num + '_wm'] : "true"; imgEl.style.display = 'block'; textEl.style.display = 'none'; } 
            else { imgEl.src = ''; imgEl.dataset.raw = ''; imgEl.dataset.wm = "true"; imgEl.style.display = 'none'; textEl.style.display = 'block'; }
        }
        const hasExtra = [4,5,6,7,8,9,10,11,12].some(n => d['p'+n] && d['p'+n].length > 100);
        if(hasExtra) { document.getElementById('extra-photo-container').style.display = 'block'; }
        autoSave();
    }

    function delLocal(i) { 
        savedList.splice(i, 1); 
        localStorage.setItem('metro_savedList', JSON.stringify(savedList)); 
        if (editingIndex === i) { clearInputs(true); } else if (editingIndex > i) { editingIndex--; }
        updateTable(); 
    }

    function clearInputs(isSaveLocal) { 
        ['dong','ho','loc','type','contractor','desc'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value=''; }); 
        document.querySelector('input[name="area-type"][value="private"]').checked = true; toggleArea();
        for(let i=1; i<=12; i++) { let el = document.getElementById('p'+i); el.style.display='none'; el.src=''; el.dataset.raw=''; el.dataset.wm='true'; document.getElementById('t'+i).style.display='block'; }
        document.getElementById('extra-photo-container').style.display = 'none';
        editingIndex = -1; 
        document.getElementById('btn-save').innerHTML = "💾 임시 저장"; 
        if(isSaveLocal) { autoSave(); } else { localStorage.removeItem('metro_autoSave'); }
    }

    async function send() {
        if(isProcessingImage) return showMsg("⏳ 사진 처리가 진행 중입니다.");
        const d_init = getD(); if(!currentSid || !d_init.dong || !d_init.ho || !d_init.work) return showMsg("🚨 필수 정보 누락!");
        
        const btn = document.getElementById('btn-send'); 
        const badge = document.getElementById('generating-badge');
        
        // 💡 [V11.1 추가] 전송 사진 개수 파악
        let photoCount = 0;
        for(let i=1; i<=12; i++) { if(d_init['p'+i] && d_init['p'+i].length > 100) photoCount++; }

        btn.innerHTML = "⏳ 전송 준비 중..."; 
        btn.style.pointerEvents = "none"; btn.style.opacity = "0.8";
        badge.innerText = `📦 ${photoCount}장의 이미지 패키징 중...`;
        badge.style.display = 'block';
        
        try {
            const d = getD(); 
            const now = new Date(); 
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            d.date = todayStr; 

            const payload = { 
                targetSheetId: currentSid, record: d, pdfBase64: "", 
                p1Base64: (d.p1||"").split(',')[1]||"", p1RawBase64: (d.p1_wm === "true") ? (d.p1_raw||"").split(',')[1]||"" : "", 
                p2Base64: (d.p2||"").split(',')[1]||"", p2RawBase64: (d.p2_wm === "true") ? (d.p2_raw||"").split(',')[1]||"" : "", 
                p3Base64: (d.p3||"").split(',')[1]||"" 
            };
            for(let i=4; i<=12; i++) {
                payload['p'+i+'Base64'] = (d['p'+i]||"").split(',')[1]||"";
                payload['p'+i+'RawBase64'] = (d['p'+i+'_wm'] === "true") ? (d['p'+i+'_raw']||"").split(',')[1]||"" : "";
            }

            // 💡 [V11.1 추가] 진행 상태 업데이트
            btn.innerHTML = "⏳ 서버 전송 중...";
            badge.innerText = "🚀 서버로 데이터 전송 중 (고해상도 이미지 포함)...";

            const response = await fetch(MY_GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); 
            
            // 💡 [V11.1 추가] 서버 응답 대기 및 PDF 생성 단계 안내
            btn.innerHTML = "⏳ 문서 생성 중...";
            badge.innerHTML = "🛠️ 서버에서 PDF 보고서 생성 중...<br><span style='font-size:11px;'>데이터가 많을 경우 최대 1분이 소요됩니다.</span>";

            if (response.ok) {
                const result = await response.json();
                if(result.result === 'success') {
                    showMsg("🎉 성공적으로 전송되었습니다!"); 
                    const historyRecord = { ...d, sentDate: todayStr }; 
                    sentTodayList.push(historyRecord);
                    localStorage.setItem('metro_sentListToday', JSON.stringify(sentTodayList)); 
                    updateSentTable();
                    if (editingIndex > -1) { 
                        savedList.splice(editingIndex, 1); 
                        localStorage.setItem('metro_savedList', JSON.stringify(savedList)); 
                    }
                    clearInputs(true); 
                    updateTable(); 
                } else {
                    showMsg("❌ 서버 처리 오류: " + (result.message || "알 수 없는 오류"));
                }
            } else {
                showMsg("❌ 네트워크 전송 지연: 나중에 다시 시도해 주세요.");
            }
        } catch(e) { 
            showMsg("❌ 통신 상태가 불안정합니다.\n드라이브에 저장되었는지 확인 바랍니다."); 
        } finally { 
            badge.style.display = 'none';
            badge.innerText = "🚀 전송 준비 중...";
            btn.innerHTML = "🚀 최종 전송"; btn.style.pointerEvents = "auto"; btn.style.opacity = "1"; 
        }
    }
</script>
